<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCG - デジタルカードゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a14;
  --panel: #12121e;
  --border: #2a2a4a;
  --text: #c8c8e8;
  --accent: #6060ff;
  --red: #cc3333;
  --blue: #3366cc;
  --green: #336633;
  --white: #ccccaa;
  --black: #443344;
  --gold: #ccaa33;
  --danger: #ff4444;
  --heal: #44ff88;
}
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
}

/* ── 全体レイアウト ── */
#game {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(120,20,20,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(10,60,20,0.55) 0%, transparent 70%),
    linear-gradient(180deg, #0a0814 0%, #080c0a 100%);
}

/* 左側：ボード */
#board {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-width: 0;
}

/* 右側：サイドパネル */
#side-panel {
  display: none;
}

/* プレイヤー情報ヘッダー */
.player-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
}

.zone-label {
  font-size: 9px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 2px;
  white-space: nowrap;
}

/* ── カード ── */
.card {
  width: 72px;
  height: 104px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 9px;
}
.card:hover { transform: translateY(-5px) scale(1.06); z-index: 20; }
.card.selected { box-shadow: 0 0 0 2px #ffff44, 0 0 14px #ffff44; }
.card.tapped { transform: rotate(15deg); opacity: 0.85; margin-right: 12px; }
.card.tapped:hover { transform: rotate(15deg) translateY(-5px) scale(1.06); }
.card.tapped .card-pt { transform: rotate(-15deg); transform-origin: center bottom; }
.card.face-down { background: linear-gradient(135deg, #1a1a3a 25%, #0d0d22 75%); }
.card.face-down::after { content: '🎴'; font-size: 32px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.card.playable { box-shadow: 0 0 10px #44ff44; border-color: #44ff44; }
.card.attackable { box-shadow: 0 0 10px #ff8800; border-color: #ff8800; cursor: crosshair; }
.card.blockable { box-shadow: 0 0 10px #ff4488; border-color: #ff4488; cursor: crosshair; }
.card.targetable { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; cursor: crosshair; }
.card.damaged { animation: shake 0.3s; }
.card.dying { animation: die 0.5s forwards; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
@keyframes die { to { transform: scale(0) rotate(180deg); opacity: 0; } }
@keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }

.card-art {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card-bottom {
  padding: 2px 3px;
  background: rgba(0,0,0,0.65);
}
.card-name { font-size: 7px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-type-line { font-size: 6px; color: #999; }
.card-pt { font-size: 9px; font-weight: 700; text-align: right; margin-top: 1px; }
.card-cost { position: absolute; top: 2px; right: 2px; font-size: 7px; background: rgba(0,0,0,0.85); border-radius: 3px; padding: 1px 3px; }
.card-keywords { font-size: 6px; color: #ffcc44; }
.damage-counter {
  position: absolute;
  top: 3px;
  left: 3px;
  background: #cc0000;
  color: white;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  font-size: 9px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}
.charge-indicator {
  position: absolute;
  bottom: 28px;
  right: 3px;
  background: #ffaa00;
  color: #000;
  border-radius: 2px;
  font-size: 7px;
  padding: 0 2px;
  font-weight: bold;
}

/* ── カード色テーマ ── */
.color-R { background: linear-gradient(160deg, #2a0a0a, #1a0505); border-color: #883333; }
.color-R .card-art { color: #ff6633; }
.color-U { background: linear-gradient(160deg, #0a0a2a, #05051a); border-color: #333388; }
.color-U .card-art { color: #4488ff; }
.color-G { background: linear-gradient(160deg, #0a1a0a, #051005); border-color: #338833; }
.color-G .card-art { color: #44cc44; }
.color-W { background: linear-gradient(160deg, #1e1e12, #141408); border-color: #888844; }
.color-W .card-art { color: #eeeebb; }
.color-B { background: linear-gradient(160deg, #14091a, #0a0510); border-color: #554455; }
.color-B .card-art { color: #aa66cc; }
.color-C { background: linear-gradient(160deg, #1a1a1a, #0d0d0d); border-color: #555555; }
.color-C .card-art { color: #aaaaaa; }

/* ── 土地カード ── */
.land-card {
  width: 68px; height: 50px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  overflow: hidden;
}
.land-card:hover { transform: scale(1.1); z-index: 5; }
.land-card.tapped { transform: rotate(15deg); margin-right: 8px; }
.land-card.tapped:hover { transform: rotate(15deg) scale(1.1); }
.land-card.selected { box-shadow: 0 0 0 2px #ffff44; }
.land-card .land-name { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 7px; color: rgba(255,255,255,0.75); }
.land-card .charge-pip { position: absolute; top: 2px; right: 2px; background: #ffaa00; border-radius: 50%; width: 10px; height: 10px; font-size: 7px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

/* ── ゾーン ── */
.hand-zone {
  display: flex;
  gap: 4px;
  padding: 4px 6px;
  min-height: 116px;
  align-items: center;
  flex-wrap: nowrap;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: #2a2a4a transparent;
}
.field-zone {
  display: flex;
  gap: 6px;
  padding: 4px 6px;
  min-height: 0;
  align-items: center;
  flex: 1;
  overflow: visible;
}
.land-zone {
  display: flex;
  gap: 5px;
  padding: 3px 6px;
  min-height: 54px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.field-slot {
  width: 72px; height: 104px;
  border: 1px dashed #252540;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #2a2a4a;
  font-size: 11px;
  position: relative;
}

/* ── ゾーン行 ── */
.board-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: visible;
}
.board-row.ai-row { border-color: #3a2a2a; }
.board-row.player-row { border-color: #2a3a2a; }

/* ── 情報バー ── */
#info-bar {
  display: flex;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(8,8,20,0.88);
  border-top: 1px solid #2a2a5a;
  border-bottom: 1px solid #2a2a5a;
  align-items: center;
  flex-shrink: 0;
  flex-wrap: wrap;
  height: 42px;
  min-height: 42px;
}
.life-display {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 22px;
  font-weight: 900;
  text-shadow: 0 0 8px currentColor, 0 0 16px rgba(255,80,80,0.5);
}
.life-display.low { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.phase-display {
  background: var(--accent);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
}
.cx-display { background: #2a1a4a; padding: 3px 7px; border-radius: 4px; font-size: 12px; }
.oc-display { background: #4a1a2a; padding: 3px 7px; border-radius: 4px; font-size: 12px; color: #ff88aa; }
.mana-display { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; max-width: 120px; }
.mana-pip { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
.mana-R { background: #cc3333; color: white; }
.mana-U { background: #3366cc; color: white; }
.mana-G { background: #336633; color: white; }
.mana-W { background: #cccc88; color: #333; }
.mana-B { background: #553355; color: white; }
.mana-C { background: #555; color: white; }

/* ── スタック ── */
#stack-area {
  display: flex;
  gap: 6px;
  padding: 4px 8px;
  background: #0d0d1a;
  border: 1px solid #2a2a5a;
  border-radius: 6px;
  min-height: 32px;
  align-items: center;
  flex-shrink: 0;
}
.stack-item {
  background: #1a1a3a;
  border: 1px solid #4444aa;
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 11px;
  color: #aaaaff;
}

/* ── サイドパネル ── */
#side-panel-inner {
  display: flex;
  flex-direction: column;
  gap: 6px;
  height: 100%;
  overflow: hidden;
}

/* プレイヤー情報カード */
.player-stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  flex-shrink: 0;
}
.player-stat-card h3 { font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

/* コントロール */
#controls {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  flex: 1;
}
#controls-btns { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
button {
  background: rgba(20,20,40,0.85);
  border: 1px solid #3a3a6a;
  color: var(--text);
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
button:hover { background: #2a2a4a; box-shadow: 0 0 6px rgba(96,96,255,0.3); }
button:disabled { opacity: 0.35; cursor: default; }
button.primary {
  background: linear-gradient(135deg, #3a3aaa, #2a2a8a);
  border-color: var(--accent);
  color: #eeeeff;
  font-weight: 700;
  font-size: 13px;
  padding: 6px 16px;
  box-shadow: 0 0 10px rgba(96,96,255,0.4);
}
button.primary:hover { background: linear-gradient(135deg, #5050cc, #3a3aaa); box-shadow: 0 0 16px rgba(96,96,255,0.7); }
#btn-end-phase {
  background: linear-gradient(135deg, #2a6a3a, #1a4a28);
  border-color: #44cc66;
  color: #88ffaa;
  font-weight: 900;
  font-size: 14px;
  padding: 7px 20px;
  box-shadow: 0 0 12px rgba(50,200,80,0.5);
  letter-spacing: 0.5px;
}
#btn-end-phase:hover { background: linear-gradient(135deg, #3a8a4a, #2a6a38); box-shadow: 0 0 20px rgba(50,200,80,0.8); }
button.danger { background: #4a1a1a; border-color: #cc3333; }
button.danger:hover { background: #6a2a2a; }

/* ログ (スタイルは #log-overlay ブロックで定義) */
#log p { margin: 2px 0; line-height: 1.4; }
#log p.important { color: #ffcc44; }
#log p.damage { color: #ff6644; }
#log p.heal { color: #44ff88; }

/* ── AI Info Strip ── */
#ai-info-strip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 12px;
  height: 38px;
  min-height: 38px;
  background: rgba(60,10,10,0.75);
  border-bottom: 1px solid #5a2020;
  flex-shrink: 0;
}
#ai-info-strip .life-display { font-size: 20px; text-shadow: 0 0 8px #ff4444, 0 0 16px rgba(255,50,50,0.4); }
#ai-info-strip .info-count { font-size: 10px; color: #cc8888; }

/* ── Player Action Bar ── */
#player-action-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  height: 44px;
  min-height: 44px;
  background: rgba(10,50,20,0.80);
  border-top: 1px solid #1a5a2a;
  flex-shrink: 0;
  overflow: visible;
}
#player-action-bar .life-display { font-size: 20px; text-shadow: 0 0 8px #44ff88, 0 0 16px rgba(40,200,80,0.4); }
#player-action-bar .info-count { font-size: 10px; color: #88cc88; }
#player-action-bar .sep { width: 1px; background: #2a5a3a; align-self: stretch; margin: 0 2px; }
#action-hint { font-size: 11px; color: #aaaaff; white-space: nowrap; }

/* ── Log Overlay ── */
#log-overlay {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  z-index: 60;
  display: flex;
  flex-direction: row;
  transform: translateX(216px);
  transition: transform 0.25s ease;
}
#log-overlay.open { transform: translateX(0); }
#log-toggle-btn {
  width: 24px;
  align-self: center;
  height: 80px;
  background: rgba(20,20,50,0.9);
  border: 1px solid #3a3a6a;
  border-right: none;
  border-radius: 6px 0 0 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #aaaaff;
  writing-mode: vertical-rl;
  letter-spacing: 2px;
  padding: 8px 0;
  flex-shrink: 0;
}
#log-toggle-btn:hover { background: rgba(40,40,80,0.95); }
#log-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(10,10,22,0.95);
  border-left: 1px solid #2a2a5a;
  overflow: hidden;
}
#log {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
  font-size: 11px;
  color: #7788aa;
  scrollbar-width: thin;
  scrollbar-color: #2a2a4a transparent;
}

/* ── Card Detail Panel ── */
#card-detail-panel {
  position: fixed;
  bottom: 150px;
  left: 10px;
  width: 200px;
  background: rgba(12,12,24,0.90);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  z-index: 55;
}

/* ── モーダル ── */
#modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal.active { display: flex; }
#modal-box {
  background: #12121e;
  border: 2px solid var(--accent);
  border-radius: 10px;
  padding: 24px;
  max-width: 640px;
  width: 95%;
  max-height: 80vh;
  overflow-y: auto;
}
#modal-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #aaaaff; }
#modal-cards { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
#modal-btn { margin-top: 12px; }

/* ── フローティングダメージ ── */
.float-damage {
  position: fixed;
  font-size: 26px;
  font-weight: 900;
  pointer-events: none;
  z-index: 200;
  animation: floatUp 1.2s forwards;
  text-shadow: 0 0 10px currentColor;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-70px)} }

#turn-indicator { font-size: 11px; color: #666; }
.highlight { background: rgba(255,255,100,0.05); border-radius: 4px; }
.sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 2px; }
#action-hint { font-size: 11px; color: #aaaaff; }

/* ── 1. カード詳細パネル (スタイルは #card-detail-panel ブロックで定義) ── */
#card-detail-panel .cdp-title { font-size: 13px; font-weight: 700; color: #aaaaff; margin-bottom: 4px; }
#card-detail-panel .cdp-type { font-size: 10px; color: #888; margin-bottom: 4px; }
#card-detail-panel .cdp-pt { font-size: 12px; font-weight: 700; color: #ffcc44; margin-bottom: 4px; }
#card-detail-panel .cdp-kw { margin-bottom: 4px; }
#card-detail-panel .cdp-text { font-size: 10px; color: #aaa; white-space: pre-wrap; line-height: 1.5; }
#card-detail-panel .cdp-placeholder { color: #444; font-size: 10px; }

/* ── 2. キーワードツールチップ ── */
.kw-tip {
  cursor: help;
  color: #ffcc44;
  border-bottom: 1px dotted #ffcc44;
}
#kw-tooltip {
  position: fixed;
  background: #1a1a3a;
  border: 1px solid #4444aa;
  color: #ccccff;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 5px;
  pointer-events: none;
  z-index: 9999;
  max-width: 220px;
  white-space: normal;
  display: none;
  line-height: 1.4;
}

/* ── 4. スタック常時表示 ── */
#stack-area {
  border: 1px solid #2a2a5a !important;
  background: #0a0a16 !important;
  padding: 4px 8px !important;
  border-radius: 6px;
  min-height: 32px;
}

/* ── 5. CX/OC閾値ゲージ ── */
.threshold-gauge-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 110px;
}
.threshold-gauge-label { font-size: 9px; color: #888; }
.threshold-gauge {
  height: 14px;
  background: #1a1a2a;
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid #333;
}
.threshold-gauge-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s, background 0.3s;
}

/* ── 6. ログ固定最新エントリ ── */
#log-recent {
  background: rgba(255,200,50,0.07);
  border-bottom: 1px solid #333;
  padding: 4px 6px;
  margin-bottom: 4px;
  border-radius: 4px 4px 0 0;
}
#log-recent p { margin: 1px 0; font-size: 10px; }

/* ── 7. 攻撃矢印オーバーレイ ── */
#arrow-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: 50;
}

/* ── 9. AI バルーン ── */
#ai-balloon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(10,10,30,0.88);
  border: 1px solid #6060ff;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 700;
  color: #aaaaff;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 30;
  white-space: nowrap;
}
#ai-balloon.active { opacity: 1; }

/* ── 10. フェイズフラッシュ ── */
#phase-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 300;
  opacity: 0;
  text-align: center;
  transition: none;
}
#phase-flash.active {
  animation: phaseFlashAnim 2s forwards;
}
#phase-flash .pf-main {
  font-size: 52px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 40px #ccaa33, 0 2px 12px #000;
  display: block;
  line-height: 1.1;
}
#phase-flash .pf-sub {
  font-size: 18px;
  font-weight: 700;
  color: #aaaaff;
  display: block;
  margin-top: 4px;
  text-shadow: 0 0 12px #6060ff, 0 2px 6px #000;
}
@keyframes phaseFlashAnim {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }

/* ── レスポンシブレイアウト ── */

/* ══════════════════════════════════════════════════════
   スマホ・タブレット 横向き — Shadowverse方式
   フィールドを全画面に。UI要素はすべてoverlay。
   ══════════════════════════════════════════════════════ */
@media (max-width: 1024px) and (orientation: landscape) {

  /* ── MTGアリーナ風レイアウト: flex縦積み ── */
  /* 固定バー + 比例フィールド。AIフィールドを大きく取る */
  #board {
    display: flex;
    flex-direction: column;
    height: 100svh; /* safe-area対応 */
    overflow: hidden;
    gap: 0;
  }

  /* 不要行を非表示 */
  #ai-hand-row      { display: none !important; }
  #ai-lands-row     { display: none !important; }
  #player-lands-row { display: none !important; }

  /* ── 固定バー ── */
  #ai-info-strip {
    flex: 0 0 28px;
    height: 28px; min-height: 28px;
    padding: 0 10px; gap: 8px;
    background: rgba(50,8,8,0.88);
    border-bottom: 1px solid rgba(180,60,60,0.3);
  }
  #ai-info-strip .life-display { font-size: 18px; min-width: 48px; }
  #ai-info-strip .info-count { font-size: 9px; }

  /* ── AIフィールド: 残りの3/5 ── */
  #ai-field-row {
    flex: 3 3 0;
    min-height: 0;
    background: rgba(40,8,8,0.20);
    overflow: hidden;
  }

  /* ── 中央バー: フェイズ表示 ── */
  #info-bar {
    flex: 0 0 22px;
    height: 22px; min-height: 22px;
    padding: 0 8px; gap: 5px;
    flex-wrap: nowrap; overflow: hidden;
    border-top: 1px solid rgba(80,80,180,0.35);
    border-bottom: 1px solid rgba(80,80,180,0.35);
    background: rgba(6,6,18,0.95);
    align-items: center;
  }
  #info-bar #turn-indicator { font-size: 10px; white-space: nowrap; }
  #info-bar .phase-display  { font-size: 10px; padding: 1px 7px; }
  #info-bar .sep            { display: none; }
  #threshold-gauge-wrap     { display: none; }
  #mana-display-wrap        { display: none; }
  #info-bar > span          { display: none; }
  #stack-area {
    flex: 1; min-height: 18px;
    padding: 1px 5px; font-size: 9px;
    margin-left: 4px;
  }

  /* ── PLフィールド: 残りの2/5 ── */
  #player-field-row {
    flex: 2 2 0;
    min-height: 0;
    background: rgba(8,30,8,0.20);
    overflow: hidden;
  }

  /* ── フィールドゾーン ── */
  .field-zone { padding: 4px 6px; gap: 5px; align-content: center; }

  /* ── PLアクションバー ── */
  #player-action-bar {
    flex: 0 0 40px;
    height: 40px; min-height: 40px;
    padding: 0 10px; gap: 6px;
    flex-wrap: nowrap; overflow: visible;
    background: rgba(8,40,14,0.92);
    border-top: 1px solid rgba(40,160,60,0.3);
    align-items: center;
  }
  #player-action-bar .life-display { font-size: 18px; min-width: 48px; }
  #player-action-bar .info-count   { display: none; }
  #player-action-bar .sep          { display: none; }
  #player-action-bar > button      { display: none; }

  /* コントロールボタン */
  #controls      { gap: 4px; flex-wrap: nowrap; overflow: visible; align-items: center; }
  #controls-btns { gap: 4px; flex-wrap: nowrap; }
  #controls-btns button { padding: 4px 9px; font-size: 11px; }
  #btn-end-phase { padding: 5px 14px; font-size: 12px; font-weight: 700; }
  #action-hint   { font-size: 9px; max-width: 120px; white-space: normal; line-height: 1.2; }
  #controls-btns button[onclick="showTrainingPanel()"],
  #controls-btns button[onclick="showDebugPanel()"] { display: none; }

  /* ── 手札: 固定88px、カード重ね表示 ── */
  #player-hand-row {
    flex: 0 0 88px;
    height: 88px; min-height: 88px;
    overflow: visible;
  }
  #player-hand.hand-zone {
    height: 100%;
    padding: 4px 16px 4px;
    gap: 0;
    overflow: visible;
    align-items: flex-end;
    justify-content: center;
  }
  #player-hand .card {
    margin-right: -20px;
    transition: transform 0.15s, margin 0.15s, z-index 0s;
    flex-shrink: 0;
  }
  #player-hand .card:hover,
  #player-hand .card:last-child {
    margin-right: 2px;
    z-index: 30;
    transform: translateY(-6px);
  }

  /* ── カードサイズ: アリーナ風コンパクト ── */
  .card { width: 50px; height: 70px; font-size: 8px; border-radius: 4px; }
  .field-slot { width: 50px; height: 70px; }
  .card-art { font-size: 16px; }
  .card-name { font-size: 7px; line-height: 1.1; }
  .card-pt { font-size: 8px; padding: 1px 2px; }
  .card-cost { font-size: 7px; }
  .land-card { width: 32px; height: 26px; font-size: 12px; }
  .land-card .land-name { display: none; }

  /* ── ログ・詳細パネルは非表示 ── */
  #log-overlay       { display: none !important; }
  #card-detail-panel { display: none !important; }

  /* マリガン */
  #mulligan-controls { flex-wrap: nowrap; }
  #mulligan-controls button { padding: 4px 8px; font-size: 10px; }
}

/* ── スマホ 縦向き / 極小画面 ── */
@media (max-width: 600px) and (orientation: portrait) {
  /* 縦向きオーバーレイが表示されるため、背後のゲームは非表示でOK */
  #game { visibility: hidden; }
}

/* ── 縦向き警告オーバーレイ (スマホ・タブレットのみ) ── */
@media (max-width: 1024px) and (orientation: portrait) {
  #rotate-overlay { display: flex !important; }
}
#rotate-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #080c18;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  color: #c8cce8;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
  padding: 20px;
}
#rotate-overlay .rotate-icon {
  font-size: 72px;
  animation: rotateHint 2s ease-in-out infinite;
}
@keyframes rotateHint {
  0%   { transform: rotate(0deg); }
  40%  { transform: rotate(-90deg); }
  60%  { transform: rotate(-90deg); }
  100% { transform: rotate(-90deg) translateX(6px); }
}
#rotate-overlay p { font-size: 18px; font-weight: 700; color: #aaaaff; }
#rotate-overlay small { font-size: 13px; color: #666; }
</style>

// Build decks
function buildMainDeck() {
  const cards = ['shinmai_heishi','ten_kara_shisha','eiyuu_kouho',
    'serashia_heishi','serashia_junhei','serashia_souryo',
    'bastian','arestia','junigeki','kaizen'];
  let deck = [];
  cards.forEach(c => { for(let i=0;i<4;i++) deck.push(c); });
  return shuffle(deck); // exactly 40
}
function buildLandDeck() {
  const lands = ['hito_heichi','wasure_heichi','shigen_heichi','kemono_heichi','serashia_miyako'];
  let deck = [];
  lands.forEach(l => { deck.push(l); deck.push(l); });
  return shuffle(deck);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function drawCard(player) {
  const p = G.players[player];
  if (p.deck.length === 0) {
    log(`プレイヤー${player+1}の山札がなくなりました！`, 'important');
    endGame(1 - player);
    return false;
  }
  if (p.hand.length >= 10) {
    log(`プレイヤー${player+1}は手札が10枚以上のため引けません`);
    return false;
  }
  const cardId = p.deck.shift();
  p.hand.push(cardId);
  return true;
}

function placeLands(player, count) {
  const p = G.players[player];
  for (let i = 0; i < count; i++) {
    if (p.landDeck.length === 0) break;
    if (p.lands.length >= 10) break;
    const cardId = p.landDeck.shift();
    const inst = newInstance(cardId);
    inst.tapped = false;
    p.lands.push(inst);
    G.landPlacedThisTurn++;
    const card = CARD_DB[cardId];
    // wasure_heichi: draw when charged (chargeCard set later via charge action)
    // chargeDrawTrigger fires when chargeCard is set — handled in chargeToLand
  }
}

function untapAll(player) {
  const p = G.players[player];
  p.field.forEach(c => { c.tapped = false; c.sick = false; });
  p.lands.forEach(l => { l.tapped = false; });
}

function tapLandForMana(player, instId) {
  const p = G.players[player];
  const land = p.lands.find(l => l.instanceId === instId);
  if (!land || land.tapped) return false;
  land.tapped = true;
  const card = CARD_DB[land.cardId];
  const manaType = card.produces || 'C';
  p.mana[manaType] = (p.mana[manaType]||0) + 1;
  log(`土地をタップ: ${manaType}マナを追加`);
  render();
  return true;
}

function canAfford(player, cost) {
  const p = G.players[player];
  const mana = {...p.mana};
  for (const [c, amt] of Object.entries(cost)) {
    if (c === 'C') continue;
    if ((mana[c] || 0) < amt) return false;
    mana[c] -= amt;
  }
  const colorless = cost.C || 0;
  const total = Object.values(mana).reduce((a,b)=>a+b,0);
  return total >= colorless;
}

function payMana(player, cost) {
  const p = G.players[player];
  for (const [c, amt] of Object.entries(cost)) {
    if (c === 'C') continue;
    p.mana[c] -= amt;
  }
  let colorless = cost.C || 0;
  const colors = ['R','U','G','W','B','C'];
  for (const c of colors) {
    if (colorless <= 0) break;
    const take = Math.min(p.mana[c], colorless);
    p.mana[c] -= take;
    colorless -= take;
  }
}

function costToString(cost) {
  let s = '';
  if (cost.C) s += cost.C;
  ['R','U','G','W','B'].forEach(c => { if (cost[c]) s += c.repeat(cost[c]); });
  return s || '0';
}

function playCardFromHand(player, handIndex) {
  const p = G.players[player];
  const cardId = p.hand[handIndex];
  const card = CARD_DB[cardId];
  if (!card) return;

  if (card.type === 'land') {
    log('土地は手札から直接プレイできません（土地デッキから自動配置）');
    return;
  }

  const isMyTurn = G.activePlayer === player;
  const inMain = G.phase === 'main';
  const isQuick = card.keywords && card.keywords.includes('Quick');

  const inPriorityWindow = G.awaitingPriority;
  // ターンプレイヤーは優先権ウィンドウ中も通常通り使える
  // 非ターンプレイヤーはQuickのみ
  if (!isMyTurn && !isQuick) { log('非ターンプレイヤーはQuickのみ使用できます'); return; }
  // メインフェイズ外では優先権ウィンドウ中のみ許可（ターンプレイヤーは何でも、非ターンはQuick）
  if (!inMain && !isQuick && !inPriorityWindow) { log('メインフェイズ以外ではカードをプレイできません'); return; }
  if (!inMain && !isQuick && !isMyTurn) { log('非ターンプレイヤーはQuickのみ使用できます'); return; }
  // 非ターンプレイヤーはQuickのみスタックに積める
  if (G.stack.length > 0 && !isMyTurn && !isQuick) { log('スタック処理中は唱えられません（非ターンプレイヤーはQuickのみ対応可）'); return; }

  if (!canAfford(player, card.cost)) { log('マナが足りません'); return; }

  if (card.type === 'spell') {
    if (card.effect === 'junigeki') {
      // 対象選択してからスタックへ
      G.targetMode = { type:'opponentCreature', callback: (tgt1) => {
        G.targetMode = { type:'ownCreature', owner:player, callback: (tgt2) => {
          G.targetMode = null;
          payMana(player, card.cost);
          p.hand.splice(handIndex, 1);
          log(`${card.name} をスタックに積んだ`, 'important');
          G.stack.push({ name: card.name, icon: card.icon||'🛡️', owner: player, resolve: () => {
            applyDamageToCreature(1-player, tgt1.instId, 2, player);
            const oc = G.players[player].field.find(x=>x.instanceId===tgt2.instId);
            if (oc) { oc.tempToughness=(oc.tempToughness||0)+1; G.tempBuffs.push({instanceId:tgt2.instId,power:0,toughness:1}); }
            p.graveyard.push(cardId);
            log(`${card.name} 解決: 2ダメージ + +0/+1`, 'damage');
            render();
          }});
          renderStack(); render(); updateHints();
          openPriorityWindow(1 - player, null);
        }};
        log('自クリーチャーを選択（+0/+1）');
        render(); updateHints();
      }};
      log('対戦相手クリーチャーを選択（2ダメージ）');
      G.selectedCard = {owner:player, zone:'hand', index:handIndex};
      render(); updateHints();
      return;
    }
    if (card.effect === 'kaizen') {
      playKaizen(player, handIndex);
      return;
    }
    payMana(player, card.cost);
    p.hand.splice(handIndex, 1);
    log(`${card.name} をスタックに積んだ`, 'important');
    G.stack.push({ name: card.name, icon: card.icon||'✨', owner: player, resolve: () => {
      p.graveyard.push(cardId);
      log(`${card.name} 解決`);
      render();
    }});
    renderStack(); render(); updateHints();
    openPriorityWindow(1 - player, null);
    return;
  }

  // Creature: スタックに積んで解決時に場に出る
  if (p.field.length >= 5) { log('フィールドがいっぱいです（最大5体）'); return; }
  payMana(player, card.cost);
  p.hand.splice(handIndex, 1);
  const inst = newInstance(cardId);
  inst.sick = true;
  inst.entryTurn = G.turn;
  log(`${card.name} をスタックに積んだ (${costToString(card.cost)})`, 'important');
  G.stack.push({ name: card.name, icon: card.icon||'⚔️', owner: player, resolve: () => {
    if (p.field.length >= 5) { p.graveyard.push(cardId); log(`${card.name}: フィールドが満杯`); return; }
    p.field.push(inst);
    log(`${card.name} が場に出た`, 'important');
    fireETB(player, inst.instanceId);
    render();
  }});
  renderStack(); render(); updateHints();
  openPriorityWindow(1 - player, null);
}

function kaizenChoice(player, handIndex, choice) {
  closeModal();
  const p = G.players[player];
  const cardId = p.hand[handIndex];
  const card = CARD_DB[cardId];

  if (!canAfford(player, card.cost)) { log('マナが足りません'); return; }

  if (choice === 'A') {
    G.targetMode = { type:'opponentCreature', callback:(tgt) => {
      G.targetMode = null;
      payMana(player, card.cost);
      p.hand.splice(handIndex, 1);
      log(`介善(A) をスタックに積んだ`, 'important');
      G.stack.push({ name: card.name, icon: card.icon||'✨', owner: player, resolve: () => {
        applyDamageToCreature(1-player, tgt.instId, 2, player);
        p.graveyard.push(cardId);
        G.blockDrawTrigger = true;
        log(`介善(A) 解決: 2ダメージ、ブロック時1ドロー`, 'damage');
        render();
      }});
      renderStack(); render(); updateHints();
      openPriorityWindow(1 - player, null);
    }};
    log('対象クリーチャーを選択（2ダメージ）');
  } else {
    G.targetMode = { type:'opponentCreature', callback:(tgt) => {
      G.targetMode = null;
      payMana(player, card.cost);
      p.hand.splice(handIndex, 1);
      log(`介善(B) をスタックに積んだ`, 'important');
      G.stack.push({ name: card.name, icon: card.icon||'✨', owner: player, resolve: () => {
        const tc = G.players[1-player].field.find(x=>x.instanceId===tgt.instId);
        if (tc) { tc.mustAttack = true; G.mustAttackCreatures.add(tgt.instId); }
        p.graveyard.push(cardId);
        G.blockDrawTrigger = true;
        log(`介善(B) 解決: 攻撃強制、ブロック時1ドロー`, 'important');
        render();
      }});
      renderStack(); render(); updateHints();
      openPriorityWindow(1 - player, null);
    }};
    log('対象クリーチャーを選択（攻撃強制）');
  }
  render(); updateHints();
}

function kaizenOCPlay(player, handIndex) {
  closeModal();
  const p = G.players[player];
  // Show eligible creatures from hand (total cost ≤ 8, not used same name)
  const eligible = p.hand.map((cid,i)=>({cid,i,card:CARD_DB[cid]}))
    .filter(({cid,card}) => card.type === 'creature' && totalCost(card.cost) <= 8 && !G.kaizen_used_names.has(card.name));
  if (eligible.length === 0) { log('介善OC: 該当クリーチャーなし'); return; }

  let html = `<p style="margin-bottom:10px;">BFに出すクリーチャーを選択（攻撃不可）:</p><div style="display:flex; flex-wrap:wrap; gap:8px;" id="koc-cards"></div>`;
  showModal('介善 OC', html);
  const container = document.getElementById('koc-cards');
  eligible.forEach(({cid,i,card}) => {
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.innerHTML = buildCardHTML(card);
    el.onclick = () => {
      closeModal();
      if (p.field.length >= 5) { log('フィールドがいっぱい'); return; }
      G.kaizen_used_names.add(card.name);
      const inst2 = newInstance(cid);
      inst2.sick = false;
      G.cantAttackPermanent.add(inst2.instanceId);
      p.hand.splice(i, 1);
      p.field.push(inst2);
      fireETB(player, inst2.instanceId);
      log(`介善OC: ${card.name} をBFに配置（攻撃不可）`, 'important');
      render(); updateHints();
    };
    container.appendChild(el);
  });
}

function fireETB(player, instanceId) {
  const p = G.players[player];
  const inst = p.field.find(c=>c.instanceId===instanceId);
  if (!inst) return;
  const card = CARD_DB[inst.cardId];
  const opp = 1-player;

  if (card.etb === 'damage1opponent') {
    // Target opponent creature: 1 damage
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 1, player);
        log(`${card.name} ETB: 対戦相手クリーチャーに1ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（1ダメージ）`);
      render(); updateHints();
    } else {
      // AI: target player's strongest creature
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
        applyDamageToCreature(opp, tgt.instanceId, 1, player);
        log(`AI ${card.name} ETB: 1ダメージ`, 'damage');
      }
    }
  } else if (card.etb === 'look3keep1white') {
    doLook3Keep1White(player);
  } else if (card.etb === 'mustAttackTarget') {
    // Choose opponent creature: must attack next turn
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        const tc = G.players[opp].field.find(x=>x.instanceId===tgt.instId);
        if (tc) { tc.mustAttack = true; G.mustAttackCreatures.add(tgt.instId); }
        log(`${card.name} ETB: 対戦相手クリーチャーに攻撃強制`, 'important');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（次ターン攻撃強制）`);
      render(); updateHints();
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets[0];
        tgt.mustAttack = true; G.mustAttackCreatures.add(tgt.instanceId);
        log(`AI ${card.name} ETB: 攻撃強制`);
      }
    }
  } else if (card.etb === 'damage3opponent') {
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 3, player);
        log(`${card.name} ETB: 3ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（3ダメージ）`);
      render(); updateHints();
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
        applyDamageToCreature(opp, tgt.instanceId, 3, player);
        log(`AI ${card.name} ETB: 3ダメージ`, 'damage');
      }
    }
  } else if (card.etb === 'damage2opponent_always_cx6damage3') {
    const hasCX6 = getCXValue(player) >= 6;
    const oppField = G.players[opp].field;
    if (player === 0) {
      if (oppField.length > 0) {
        // ETB: ダメージのみ（格闘はフィールド起動）
        bastianChooseETB(inst.instanceId, hasCX6);
      }
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
        applyDamageToCreature(opp, tgt.instanceId, 2, player);
        log(`AI ${card.name} ETB: 2ダメージ`, 'damage');
        if (hasCX6) {
          applyDamageToCreature(opp, tgt.instanceId, 3, player);
          log(`AI ${card.name} CX6 ETB: さらに3ダメージ`, 'damage');
        }
      }
    }
  }
}

function startKakutou(player, instanceId) {

  if (!inst) return;

  if (reachable.length === 0) {
    log(`${card.name} 格闘: 対象クリーチャーがいません`);
    return;
  }
  inst.tapped = true;
  G.combatArrows = [{fromId: instanceId, toId: null, color: '#ff8800'}];
  G.kakutouTargetMode = true;
  G.pendingKakutouInstId = instanceId;
  G.kakutouTargets = {};
