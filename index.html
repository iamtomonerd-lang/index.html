<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCG - デジタルカードゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a14;
  --panel: #12121e;
  --border: #2a2a4a;
  --text: #c8c8e8;
  --accent: #6060ff;
  --red: #cc3333;
  --blue: #3366cc;
  --green: #336633;
  --white: #ccccaa;
  --black: #443344;
  --gold: #ccaa33;
  --danger: #ff4444;
  --heal: #44ff88;
}
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
}

/* ── 全体レイアウト ── */
#game {
  display: grid;
  grid-template-columns: 1fr 260px;
  grid-template-rows: 1fr;
  height: 100vh;
  gap: 6px;
  padding: 6px;
}

/* 左側：ボード */
#board {
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
  min-width: 0;
}

/* 右側：サイドパネル */
#side-panel {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
}

/* プレイヤー情報ヘッダー */
.player-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
}

.zone-label {
  font-size: 9px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 2px;
  white-space: nowrap;
}

/* ── カード ── */
.card {
  width: 84px;
  height: 118px;
  border-radius: 7px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 10px;
}
.card:hover { transform: translateY(-6px) scale(1.06); z-index: 20; }
.card.selected { box-shadow: 0 0 0 2px #ffff44, 0 0 14px #ffff44; }
.card.tapped { transform: rotate(15deg); opacity: 0.85; margin-right: 10px; }
.card.tapped:hover { transform: rotate(15deg) translateY(-6px) scale(1.06); }
.card.face-down { background: linear-gradient(135deg, #1a1a3a 25%, #0d0d22 75%); }
.card.face-down::after { content: '🎴'; font-size: 32px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.card.playable { box-shadow: 0 0 10px #44ff44; border-color: #44ff44; }
.card.attackable { box-shadow: 0 0 10px #ff8800; border-color: #ff8800; cursor: crosshair; }
.card.blockable { box-shadow: 0 0 10px #ff4488; border-color: #ff4488; cursor: crosshair; }
.card.targetable { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; cursor: crosshair; }
.card.damaged { animation: shake 0.3s; }
.card.dying { animation: die 0.5s forwards; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
@keyframes die { to { transform: scale(0) rotate(180deg); opacity: 0; } }
@keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }

.card-art {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card-bottom {
  padding: 3px 4px;
  background: rgba(0,0,0,0.65);
}
.card-name { font-size: 8px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-type-line { font-size: 7px; color: #999; }
.card-pt { font-size: 10px; font-weight: 700; text-align: right; margin-top: 1px; }
.card-cost { position: absolute; top: 3px; right: 3px; font-size: 8px; background: rgba(0,0,0,0.85); border-radius: 3px; padding: 1px 3px; }
.card-keywords { font-size: 6px; color: #ffcc44; }
.damage-counter {
  position: absolute;
  top: 3px;
  left: 3px;
  background: #cc0000;
  color: white;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  font-size: 9px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}
.charge-indicator {
  position: absolute;
  bottom: 28px;
  right: 3px;
  background: #ffaa00;
  color: #000;
  border-radius: 2px;
  font-size: 7px;
  padding: 0 2px;
  font-weight: bold;
}

/* ── カード色テーマ ── */
.color-R { background: linear-gradient(160deg, #2a0a0a, #1a0505); border-color: #883333; }
.color-R .card-art { color: #ff6633; }
.color-U { background: linear-gradient(160deg, #0a0a2a, #05051a); border-color: #333388; }
.color-U .card-art { color: #4488ff; }
.color-G { background: linear-gradient(160deg, #0a1a0a, #051005); border-color: #338833; }
.color-G .card-art { color: #44cc44; }
.color-W { background: linear-gradient(160deg, #1e1e12, #141408); border-color: #888844; }
.color-W .card-art { color: #eeeebb; }
.color-B { background: linear-gradient(160deg, #14091a, #0a0510); border-color: #554455; }
.color-B .card-art { color: #aa66cc; }
.color-C { background: linear-gradient(160deg, #1a1a1a, #0d0d0d); border-color: #555555; }
.color-C .card-art { color: #aaaaaa; }

/* ── 土地カード ── */
.land-card {
  width: 68px; height: 50px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  overflow: hidden;
}
.land-card:hover { transform: scale(1.1); z-index: 5; }
.land-card.tapped { transform: rotate(15deg); margin-right: 8px; }
.land-card.tapped:hover { transform: rotate(15deg) scale(1.1); }
.land-card.selected { box-shadow: 0 0 0 2px #ffff44; }
.land-card .land-name { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 7px; color: rgba(255,255,255,0.75); }
.land-card .charge-pip { position: absolute; top: 2px; right: 2px; background: #ffaa00; border-radius: 50%; width: 10px; height: 10px; font-size: 7px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

/* ── ゾーン ── */
.hand-zone {
  display: flex;
  gap: 5px;
  padding: 5px 6px;
  min-height: 132px;
  align-items: center;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: #2a2a4a transparent;
}
.field-zone {
  display: flex;
  gap: 8px;
  padding: 5px 6px;
  min-height: 132px;
  align-items: center;
  flex: 1;
}
.land-zone {
  display: flex;
  gap: 6px;
  padding: 4px 6px;
  min-height: 62px;
  align-items: center;
  flex-wrap: wrap;
}
.field-slot {
  width: 84px; height: 120px;
  border: 1px dashed #252540;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #2a2a4a;
  font-size: 11px;
  position: relative;
}

/* ── ゾーン行 ── */
.board-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.board-row.ai-row { border-color: #3a2a2a; }
.board-row.player-row { border-color: #2a3a2a; }

/* ── 情報バー ── */
#info-bar {
  display: flex;
  gap: 6px;
  padding: 5px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  align-items: center;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.life-display {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 16px;
  font-weight: 700;
}
.life-display.low { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.5; } }
.phase-display {
  background: var(--accent);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
}
.cx-display { background: #2a1a4a; padding: 3px 7px; border-radius: 4px; font-size: 12px; }
.oc-display { background: #4a1a2a; padding: 3px 7px; border-radius: 4px; font-size: 12px; color: #ff88aa; }
.mana-display { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; max-width: 120px; }
.mana-pip { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
.mana-R { background: #cc3333; color: white; }
.mana-U { background: #3366cc; color: white; }
.mana-G { background: #336633; color: white; }
.mana-W { background: #cccc88; color: #333; }
.mana-B { background: #553355; color: white; }
.mana-C { background: #555; color: white; }

/* ── スタック ── */
#stack-area {
  display: flex;
  gap: 6px;
  padding: 4px 8px;
  background: #0d0d1a;
  border: 1px solid #2a2a5a;
  border-radius: 6px;
  min-height: 32px;
  align-items: center;
  flex-shrink: 0;
}
.stack-item {
  background: #1a1a3a;
  border: 1px solid #4444aa;
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 11px;
  color: #aaaaff;
}

/* ── サイドパネル ── */
#side-panel-inner {
  display: flex;
  flex-direction: column;
  gap: 6px;
  height: 100%;
  overflow: hidden;
}

/* プレイヤー情報カード */
.player-stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  flex-shrink: 0;
}
.player-stat-card h3 { font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }

/* コントロール */
#controls {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  flex-shrink: 0;
}
#controls-btns { display: flex; flex-wrap: wrap; gap: 5px; }
button {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: background 0.1s;
}
button:hover { background: #2a2a4a; }
button:disabled { opacity: 0.35; cursor: default; }
button.primary { background: #2a2a8a; border-color: var(--accent); }
button.primary:hover { background: #3a3aaa; }
button.danger { background: #4a1a1a; border-color: #cc3333; }
button.danger:hover { background: #6a2a2a; }

/* ログ */
#log {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
  font-size: 11px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #7788aa;
  scrollbar-width: thin;
  scrollbar-color: #2a2a4a transparent;
}
#log p { margin: 2px 0; line-height: 1.4; }
#log p.important { color: #ffcc44; }
#log p.damage { color: #ff6644; }
#log p.heal { color: #44ff88; }

/* ── モーダル ── */
#modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal.active { display: flex; }
#modal-box {
  background: #12121e;
  border: 2px solid var(--accent);
  border-radius: 10px;
  padding: 24px;
  max-width: 640px;
  width: 95%;
  max-height: 80vh;
  overflow-y: auto;
}
#modal-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #aaaaff; }
#modal-cards { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
#modal-btn { margin-top: 12px; }

/* ── フローティングダメージ ── */
.float-damage {
  position: fixed;
  font-size: 26px;
  font-weight: 900;
  pointer-events: none;
  z-index: 200;
  animation: floatUp 1.2s forwards;
  text-shadow: 0 0 10px currentColor;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-70px)} }

#turn-indicator { font-size: 11px; color: #666; }
.highlight { background: rgba(255,255,100,0.05); border-radius: 4px; }
.sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 2px; }
#action-hint { font-size: 11px; color: #aaaaff; }
</style>
</head>
<body>
<div id="game">
  <!-- 左：ボードエリア -->
  <div id="board">
    <!-- AI 手札 -->
    <div class="board-row ai-row">
      <div class="zone-label" style="writing-mode:initial; min-width:52px;">相手の手札</div>
      <div id="ai-hand" class="hand-zone" style="flex:1;"></div>
    </div>

    <!-- AI フィールド -->
    <div class="board-row ai-row" style="flex:1;">
      <div class="zone-label" style="min-width:52px;">相手フィールド</div>
      <div id="ai-field" class="field-zone" style="flex:1;"></div>
    </div>

    <!-- AI 土地 -->
    <div class="board-row ai-row">
      <div class="zone-label" style="min-width:52px;">相手の土地</div>
      <div id="ai-lands" class="land-zone" style="flex:1;"></div>
    </div>

    <!-- 中央情報バー -->
    <div id="info-bar">
      <div id="turn-indicator">ターン 1</div>
      <div class="sep"></div>
      <div class="phase-display" id="phase-name">アンタップ</div>
      <div class="sep"></div>
      <div class="cx-display">CX: <span id="cx-value">0</span></div>
      <div class="oc-display" id="oc-status">OC: ✗</div>
      <div class="sep"></div>
      <span style="font-size:11px;">マナ:</span>
      <div class="mana-display" id="mana-display"></div>
      <div id="stack-area" style="flex:1; border:none; background:transparent; padding:0; margin-left:4px; min-height:auto;">
        <span style="font-size:9px; color:#444;">スタック:</span>
        <div id="stack-items" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
      </div>
    </div>

    <!-- 自分 土地 -->
    <div class="board-row player-row">
      <div class="zone-label" style="min-width:52px;">自分の土地</div>
      <div id="player-lands" class="land-zone" style="flex:1;"></div>
    </div>

    <!-- 自分 フィールド -->
    <div class="board-row player-row" style="flex:1;">
      <div class="zone-label" style="min-width:52px;">自分フィールド</div>
      <div id="player-field" class="field-zone" style="flex:1;"></div>
    </div>

    <!-- 自分 手札 -->
    <div class="board-row player-row">
      <div class="zone-label" style="min-width:52px;">手札</div>
      <div id="player-hand" class="hand-zone" style="flex:1;"></div>
    </div>
  </div>

  <!-- 右：サイドパネル -->
  <div id="side-panel">
    <!-- AI 情報 -->
    <div class="player-stat-card" style="border-color:#3a2a2a;">
      <h3>対戦相手</h3>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="life-display" id="ai-life">❤️ 20</div>
        <div style="font-size:10px; color:#666; margin-left:auto;">
          山札 <span id="ai-deck-count">40</span> / 土地 <span id="ai-land-deck-count">10</span>
        </div>
      </div>
    </div>

    <!-- 自分 情報 -->
    <div class="player-stat-card" style="border-color:#2a3a2a;">
      <h3>自分</h3>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="life-display" id="player-life">❤️ 20</div>
        <div style="font-size:10px; color:#666; margin-left:auto;">
          山札 <span id="player-deck-count">40</span> / 土地 <span id="player-land-deck-count">10</span>
        </div>
      </div>
    </div>

    <!-- コントロール -->
    <div id="controls">
      <div id="controls-btns">
        <button id="btn-end-phase" class="primary" onclick="endPhase()">フェイズ終了</button>
        <button id="btn-pass" onclick="passPriority()">優先権パス</button>
        <button id="btn-mulligan" onclick="doMulligan()" disabled>マリガン</button>
        <button id="btn-charge" onclick="startCharge()">チャージ</button>
      </div>
      <div id="action-hint"></div>
    </div>

    <!-- ログ -->
    <div id="log"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-content"></div>
    <div id="modal-cards"></div>
    <button id="modal-btn" onclick="closeModal()">閉じる</button>
  </div>
</div>

// Build decks
function buildMainDeck() {
  const cards = ['shinmai_heishi','ten_kara_shisha','eiyuu_kouho',
    'serashia_heishi','serashia_junhei','serashia_souryo',
    'bastian','arestia','junigeki','kaizen'];
  let deck = [];
  cards.forEach(c => { for(let i=0;i<4;i++) deck.push(c); });
  return shuffle(deck); // exactly 40
}
function buildLandDeck() {
  const lands = ['hito_heichi','wasure_heichi','shigen_heichi','kemono_heichi','serashia_miyako'];
  let deck = [];
  lands.forEach(l => { deck.push(l); deck.push(l); });
  return shuffle(deck);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function newInstance(cardId) {
  return {
    instanceId: G.nextInstanceId++, cardId,
    tapped: false, damage: 0, sick: false, chargeCard: null,
    tempPower: 0, tempToughness: 0, entryTurn: G ? G.turn : 1,
    mustAttack: false
  };
}

function drawCard(player) {
  const p = G.players[player];
  if (p.deck.length === 0) {
    log(`プレイヤー${player+1}の山札がなくなりました！`, 'important');
    endGame(1 - player);
    return false;
  }
  if (p.hand.length >= 10) {
    log(`プレイヤー${player+1}は手札が10枚以上のため引けません`);
    return false;
  }
  const cardId = p.deck.shift();
  p.hand.push(cardId);
  return true;
}

function placeLands(player, count) {
  const p = G.players[player];
  for (let i = 0; i < count; i++) {
    if (p.landDeck.length === 0) break;
    if (p.lands.length >= 10) break;
    const cardId = p.landDeck.shift();
    const inst = newInstance(cardId);
    inst.tapped = false;
    p.lands.push(inst);
    G.landPlacedThisTurn++;
    const card = CARD_DB[cardId];
    // wasure_heichi: draw when charged (chargeCard set later via charge action)
    // chargeDrawTrigger fires when chargeCard is set — handled in chargeToLand
  }
}

function untapAll(player) {
  const p = G.players[player];
  p.field.forEach(c => { c.tapped = false; c.sick = false; });
  p.lands.forEach(l => { l.tapped = false; });
}

function tapLandForMana(player, instId) {
  const p = G.players[player];
  const land = p.lands.find(l => l.instanceId === instId);
  if (!land || land.tapped) return false;
  land.tapped = true;
  const card = CARD_DB[land.cardId];
  const manaType = card.produces || 'C';
  p.mana[manaType] = (p.mana[manaType]||0) + 1;
  log(`土地をタップ: ${manaType}マナを追加`);
  render();
  return true;
}

function canAfford(player, cost) {
  const p = G.players[player];
  const mana = {...p.mana};
  for (const [c, amt] of Object.entries(cost)) {
    if (c === 'C') continue;
    if ((mana[c] || 0) < amt) return false;
    mana[c] -= amt;
  }
  const colorless = cost.C || 0;
  const total = Object.values(mana).reduce((a,b)=>a+b,0);
  return total >= colorless;
}

function payMana(player, cost) {
  const p = G.players[player];
  for (const [c, amt] of Object.entries(cost)) {
    if (c === 'C') continue;
    p.mana[c] -= amt;
  }
  let colorless = cost.C || 0;
  const colors = ['R','U','G','W','B','C'];
  for (const c of colors) {
    if (colorless <= 0) break;
    const take = Math.min(p.mana[c], colorless);
    p.mana[c] -= take;
    colorless -= take;
  }
}

function costToString(cost) {
  let s = '';
  if (cost.C) s += cost.C;
  ['R','U','G','W','B'].forEach(c => { if (cost[c]) s += c.repeat(cost[c]); });
  return s || '0';
}

function playCardFromHand(player, handIndex) {
  const p = G.players[player];
  const cardId = p.hand[handIndex];
  const card = CARD_DB[cardId];
  if (!card) return;

  if (card.type === 'land') {
    log('土地は手札から直接プレイできません（土地デッキから自動配置）');
    return;
  }

  const isMyTurn = G.activePlayer === player;
  const inMain = G.phase === 'main';
  const isQuick = card.keywords && card.keywords.includes('Quick');

  if (!isMyTurn && !isQuick) { log('あなたのターンではありません'); return; }
  if (!inMain && !isQuick) { log('メインフェイズ以外ではカードをプレイできません'); return; }
  if (G.combatStep && !isQuick) { log('戦闘フェイズ中はプレイできません'); return; }

  if (!canAfford(player, card.cost)) { log('マナが足りません'); return; }

  if (card.type === 'spell') {
    if (card.effect === 'junigeki') {
      // Quick: deal 2 dmg to opponent creature AND +0/+1 to own creature
      G.targetMode = { type:'opponentCreature', callback: (tgt) => {
        payMana(player, card.cost);
        p.hand.splice(handIndex, 1);
        applyDamageToCreature(1-player, tgt.instId, 2, player);
        p.graveyard.push(cardId);
        log(`${card.name}: 対戦相手クリーチャーに2ダメージ`, 'damage');
        // Now pick own creature to buff
        G.targetMode = { type:'ownCreature', owner:player, callback: (tgt2) => {
          const oc = G.players[player].field.find(x=>x.instanceId===tgt2.instId);
          if (oc) { oc.tempToughness = (oc.tempToughness||0)+1; G.tempBuffs.push({instanceId:tgt2.instId,power:0,toughness:1}); }
          log(`${card.name}: 自クリーチャーに+0/+1`);
          G.targetMode = null; render(); updateHints();
        }};
        log('自クリーチャーを選択（+0/+1）');
        render(); updateHints();
      }};
      log('対戦相手クリーチャーを選択（2ダメージ）');
      G.selectedCard = {owner:player, zone:'hand', index:handIndex};
      render(); updateHints();
      return;
    }
    if (card.effect === 'kaizen') {
      playKaizen(player, handIndex);
      return;
    }
    payMana(player, card.cost);
    p.hand.splice(handIndex, 1);
    p.graveyard.push(cardId);
    log(`${card.name} を使用`);
    render(); updateHints();
    return;
  }

  // Creature
  if (p.field.length >= 5) { log('フィールドがいっぱいです（最大5体）'); return; }
  payMana(player, card.cost);
  p.hand.splice(handIndex, 1);
  const inst = newInstance(cardId);
  // 格闘: still sick but can attack tapped creatures on entry turn
  inst.sick = true;
  inst.entryTurn = G.turn;
  p.field.push(inst);
  log(`${card.name} を召喚 (${costToString(card.cost)})`, 'important');
  fireETB(player, inst.instanceId);
  render(); updateHints();
}

function kaizenChoice(player, handIndex, choice) {
  closeModal();
  const p = G.players[player];
  const cardId = p.hand[handIndex];
  const card = CARD_DB[cardId];

  if (!canAfford(player, card.cost)) { log('マナが足りません'); return; }

  if (choice === 'A') {
    G.targetMode = { type:'opponentCreature', callback:(tgt) => {
      payMana(player, card.cost);
      p.hand.splice(handIndex, 1);
      applyDamageToCreature(1-player, tgt.instId, 2, player);
      p.graveyard.push(cardId);
      G.blockDrawTrigger = true;
      log(`介善(A): 対戦相手クリーチャーに2ダメージ、このターンブロック時1ドロー`, 'damage');
      G.targetMode = null; render(); updateHints();
    }};
    log('対象クリーチャーを選択（2ダメージ）');
  } else {
    G.targetMode = { type:'opponentCreature', callback:(tgt) => {
      payMana(player, card.cost);
      p.hand.splice(handIndex, 1);
      const tc = G.players[1-player].field.find(x=>x.instanceId===tgt.instId);
      if (tc) { tc.mustAttack = true; G.mustAttackCreatures.add(tgt.instId); }
      p.graveyard.push(cardId);
      G.blockDrawTrigger = true;
      log(`介善(B): 対戦相手クリーチャーに攻撃強制、このターンブロック時1ドロー`, 'important');
      G.targetMode = null; render(); updateHints();
    }};
    log('対象クリーチャーを選択（攻撃強制）');
  }
  render(); updateHints();
}

function kaizenOCPlay(player, handIndex) {
  closeModal();
  const p = G.players[player];
  // Show eligible creatures from hand (total cost ≤ 8, not used same name)
  const eligible = p.hand.map((cid,i)=>({cid,i,card:CARD_DB[cid]}))
    .filter(({cid,card}) => card.type === 'creature' && totalCost(card.cost) <= 8 && !G.kaizen_used_names.has(card.name));
  if (eligible.length === 0) { log('介善OC: 該当クリーチャーなし'); return; }

  let html = `<p style="margin-bottom:10px;">BFに出すクリーチャーを選択（攻撃不可）:</p><div style="display:flex; flex-wrap:wrap; gap:8px;" id="koc-cards"></div>`;
  showModal('介善 OC', html);
  const container = document.getElementById('koc-cards');
  eligible.forEach(({cid,i,card}) => {
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.innerHTML = buildCardHTML(card);
    el.onclick = () => {
      closeModal();
      if (p.field.length >= 5) { log('フィールドがいっぱい'); return; }
      G.kaizen_used_names.add(card.name);
      const inst2 = newInstance(cid);
      inst2.sick = false;
      G.cantAttackPermanent.add(inst2.instanceId);
      p.hand.splice(i, 1);
      p.field.push(inst2);
      fireETB(player, inst2.instanceId);
      log(`介善OC: ${card.name} をBFに配置（攻撃不可）`, 'important');
      render(); updateHints();
    };
    container.appendChild(el);
  });
}

// ETB TRIGGERS
// ============================================================
function fireETB(player, instanceId) {
  const p = G.players[player];
  const inst = p.field.find(c=>c.instanceId===instanceId);
  if (!inst) return;
  const card = CARD_DB[inst.cardId];
  const opp = 1-player;

  if (card.etb === 'damage1opponent') {
    // Target opponent creature: 1 damage
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 1, player);
        log(`${card.name} ETB: 対戦相手クリーチャーに1ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（1ダメージ）`);
      render(); updateHints();
    } else {
      // AI: target player's strongest creature
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
        applyDamageToCreature(opp, tgt.instanceId, 1, player);
        log(`AI ${card.name} ETB: 1ダメージ`, 'damage');
      }
    }
  } else if (card.etb === 'look3keep1white') {
    doLook3Keep1White(player);
  } else if (card.etb === 'mustAttackTarget') {
    // Choose opponent creature: must attack next turn
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        const tc = G.players[opp].field.find(x=>x.instanceId===tgt.instId);
        if (tc) { tc.mustAttack = true; G.mustAttackCreatures.add(tgt.instId); }
        log(`${card.name} ETB: 対戦相手クリーチャーに攻撃強制`, 'important');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（次ターン攻撃強制）`);
      render(); updateHints();
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets[0];
        tgt.mustAttack = true; G.mustAttackCreatures.add(tgt.instanceId);
        log(`AI ${card.name} ETB: 攻撃強制`);
      }
    }
  } else if (card.etb === 'damage3opponent') {
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 3, player);
        log(`${card.name} ETB: 3ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log(`${card.name} ETB: 対象を選択（3ダメージ）`);
      render(); updateHints();
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
        applyDamageToCreature(opp, tgt.instanceId, 3, player);
        log(`AI ${card.name} ETB: 3ダメージ`, 'damage');
      }
    }
  } else if (card.etb === 'cx6damage3opponent') {
    // Bastian CX6 ETB
    if (getCXValue(player) >= 6) {
      if (player === 0) {
        G.targetMode = { type:'opponentCreature', callback:(tgt) => {
          applyDamageToCreature(opp, tgt.instId, 3, player);
          log(`${card.name} CX6 ETB: 3ダメージ`, 'damage');
          G.targetMode = null; render(); updateHints();
        }};
        log(`${card.name} CX6 ETB: 対象を選択（3ダメージ）`);
        render(); updateHints();
      } else {
        const targets = G.players[opp].field;
        if (targets.length > 0) {
          const tgt = targets.reduce((a,b)=>getEffectivePower(opp,b)>getEffectivePower(opp,a)?b:a);
          applyDamageToCreature(opp, tgt.instanceId, 3, player);
          log(`AI ${card.name} CX6 ETB: 3ダメージ`, 'damage');
        }
      }
    }
    // Bastian CX8 buff
    if (card.cx8Buff && getCXValue(player) >= 8) {
      addPermanentBuff(player, instanceId, 3, 3);
      log(`${card.name} CX8: +3/+3`, 'important');
    }
  }
}

function doLook3Keep1White(player) {
  const p = G.players[player];
  if (p.deck.length === 0) return;
  const top3 = p.deck.splice(0, Math.min(3, p.deck.length));
  const whites = top3.filter(cid => CARD_DB[cid] && CARD_DB[cid].color === 'W');

  if (player === 1) {
    // AI: keep a white card if any
    if (whites.length > 0) {
      p.hand.push(whites[0]);
      const rest = top3.filter(cid=>cid!==whites[0]);
      rest.forEach(cid=>p.deck.push(cid));
      log(`AI 3ルック1(白): 白カードをキープ`);
    } else {
      top3.forEach(cid=>p.deck.push(cid));
      log(`AI 3ルック1(白): 白カードなし`);
    }
    return;
  }

  // Player: show modal
  let html = `<p style="margin-bottom:10px;">白カードを1枚選んで手札に加えてください（白以外は選択不可）:</p>
    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="look3-cards"></div>
    <button onclick="look3NoKeep()" style="margin-top:10px; width:100%;">白カードなし/パス（全て底へ）</button>`;
  showModal('3ルック1(白)', html);
  window._look3Cards = top3;
  window._look3Player = player;

  const container = document.getElementById('look3-cards');
  top3.forEach((cid, i) => {
    const card = CARD_DB[cid];
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.innerHTML = buildCardHTML(card);
    const isWhite = card.color === 'W';
    if (!isWhite) { el.style.opacity = '0.4'; el.style.cursor = 'default'; }
    else {
      el.onclick = () => {
        p.hand.push(cid);
        const rest = top3.filter(c2=>c2!==cid);
        rest.forEach(c2=>p.deck.push(c2));
        log(`3ルック1: ${card.name} をキープ`);
        closeModal(); render(); updateHints();
      };
    }
    container.appendChild(el);
  });
}
function look3NoKeep() {
  const top3 = window._look3Cards || [];
  const player = window._look3Player || 0;
  top3.forEach(cid=>G.players[player].deck.push(cid));
  log('3ルック1: 全て底へ');
  closeModal(); render(); updateHints();
}

function addPermanentBuff(player, instanceId, power, toughness) {
  G.permanentBuffs.push({instanceId, power, toughness});
}

function getPermanentBuff(instanceId) {
  let pw=0, th=0;
  G.permanentBuffs.forEach(b=>{ if(b.instanceId===instanceId){pw+=b.power;th+=b.toughness;} });
  return {power:pw, toughness:th};
}

function applyDamageToCreature(player, instId, amount, sourcePlayer) {
  const pf = G.players[player];
  const c = pf.field.find(x=>x.instanceId===instId);
  if (!c) return;
  c.damage += amount;
  checkCreatureDeath(player, instId, sourcePlayer);
}

function applyDamage3(sourcePlayer, target) {
  if (target.type === 'player') {
    G.players[target.player].life -= 3;
    showFloatDamage(3, target.player === 0 ? 'player' : 'ai');
    checkDeath();
  } else if (target.type === 'creature') {
    applyDamageToCreature(target.player, target.instId, 3, sourcePlayer);
  }
}

function checkCreatureDeath(player, instId, sourcePlayer) {
  const p = G.players[player];
  const idx = p.field.findIndex(x => x.instanceId === instId);
  if (idx === -1) return false;
  const c = p.field[idx];
  const card = CARD_DB[c.cardId];
  const permBuff = getPermanentBuff(c.instanceId);
  const toughness = card.toughness + (c.tempToughness||0) + permBuff.toughness;
  const dead = c.damage >= toughness;
  if (dead) {
    p.field.splice(idx, 1);
    p.graveyard.push(c.cardId);
    log(`${card.name} が破壊された`, 'damage');
    return true;
  }
  return false;
}

function checkDeath() {
  for (let i = 0; i < 2; i++) {
    if (G.players[i].life <= 0) { endGame(1 - i); }
  }
}

function endGame(winner) {
  const who = winner === 0 ? 'あなたの' : 'AIの';
  log(`ゲーム終了！ ${who}勝利！`, 'important');
  showModal('ゲーム終了', `<p style="font-size:24px; text-align:center; margin:20px 0;">${who}勝利！</p><button onclick="location.reload()" style="width:100%;padding:10px;">もう一度プレイ</button>`);
  G.phase = 'ended';
}

// ============================================================
// PHASE MANAGEMENT
// ============================================================
function endPhase() {
  if (G.phase === 'ended') return;
  clearTargetMode();

  if (G.phase === 'main' && G.activePlayer === 0) {
    // Check if can attack (including kakutou on entry turn vs tapped)
    const canAttack = G.players[0].field.some(c => canCreatureAttack(0, c));
    if (canAttack) {
      startCombat();
      return;
    }
    endTurn();
    return;
  }

  if (G.phase === 'combat') {
    if (G.combatStep === 'declare_attackers') {
      if (G.players[0].attackers.length > 0) {
        G.combatStep = 'declare_blockers';
        log('ブロッカー宣言フェイズ（AIがブロッカーを選択中）');
        render();
        setTimeout(() => { aiDeclareBlockers(); resolveCombat(); }, 800);
      } else {
        endCombat();
      }
      return;
    }
    endCombat();
    return;
  }

  endTurn();
}

function canCreatureAttack(player, inst) {
  const card = CARD_DB[inst.cardId];
  if (G.cantAttackPermanent.has(inst.instanceId)) return false;
  if (inst.tapped) return false;
  if (!inst.sick) return true;
  // 格闘: can attack tapped opponents on entry turn
  if (card.kakutou && inst.entryTurn === G.turn) {
    return G.players[1-player].field.some(c=>c.tapped);
  }
  return false;
}

function kakutouTargetsOnly(player) {
  // Returns true if this attacker should only target tapped creatures
  // Used at declaration time for kakutou creatures on entry turn
  return false; // resolved in combat - kakutou on entry can only hit tapped
}

function startCombat() {
  G.phase = 'combat';
  G.combatStep = 'declare_attackers';
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.attackMode = true;

  // アレスティア passive: if AI has arestia and player declares attackers, player's creatures get +1/+1 temp
  // Applied once per attack declaration (when first attacker is added, handled here preemptively)
  const aiHasArestia = G.players[1].field.some(c=>CARD_DB[c.cardId].id==='arestia');
  if (aiHasArestia && !G.arestiaBuffActive) {
    G.players[0].field.forEach(c => { c.tempPower=(c.tempPower||0)+1; c.tempToughness=(c.tempToughness||0)+1; });
    G.arestiaBuffActive = true;
    log('アレスティア: 自分クリーチャー全体+1/+1（ターン終了時まで）', 'important');
  }

  log('攻撃クリーチャーを選択してください');
  render(); updateHints();
}

function endCombat() {
  G.attackMode = false;
  G.blockMode = false;
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.combatStep = null;
  G.phase = 'main';
  // Actually go to end turn
  endTurn();
}

function endTurn() {
  // Clear temp buffs
  G.tempBuffs = [];
  G.blockDrawTrigger = false;
  G.arestiaBuffActive = false;
  G.players.forEach(p => {
    p.field.forEach(c => { c.tempPower = 0; c.tempToughness = 0; });
    p.mana = {R:0,U:0,G:0,W:0,B:0,C:0};
  });
  G.attackMode = false;
  G.blockMode = false;
  G.chargingMode = false;

  G.activePlayer = 1 - G.activePlayer;
  G.turn++;
  G.landPlacedThisTurn = 0;
  G.phase = 'untap';

  const ap = G.activePlayer;
  log(`--- ターン${G.turn} ${ap===0?'プレイヤー':'AI'}のターン ---`, 'important');

  // Untap
  untapAll(ap);

  // Clear mustAttack on active player's creatures (it was set for their turn)
  G.players[ap].field.forEach(c => {
    if (c.mustAttack) { c.mustAttack = false; G.mustAttackCreatures.delete(c.instanceId); }
  });

  // アレスティア passive: if opponent has arestia, set all opponent creatures mustAttack
  const opp = 1 - ap;
  const oppHasArestia = G.players[opp].field.some(c=>CARD_DB[c.cardId].id==='arestia');
  if (oppHasArestia) {
    G.players[ap].field.forEach(c => { c.mustAttack = true; G.mustAttackCreatures.add(c.instanceId); });
  }

  G.phase = 'draw';
  placeLands(ap, 2);
  if (!G.firstTurn) drawCard(ap);
  G.firstTurn = false;

  G.phase = 'main';
  render();

  if (ap === 1) {
    setTimeout(aiTurn, 500);
  } else {
    log('あなたのメインフェイズ');
    document.getElementById('btn-mulligan').disabled = true;
    updateHints();
  }
}

// ============================================================
// CHARGE SYSTEM
// ============================================================
function startCharge() {
  if (G.activePlayer !== 0) { log('あなたのターンではありません'); return; }
  if (G.phase !== 'main') { log('メインフェイズ中のみチャージできます'); return; }
  if (G.players[0].hand.length === 0) { log('手札がありません'); return; }

  // Check if any land can still be charged
  const validLands = G.players[0].lands.filter(l => !l.chargeCard);
  if (validLands.length === 0) { log('チャージできる土地がありません'); return; }

  G.chargingMode = true;
  log('チャージするカードを手札から選んでください');
  render(); updateHints();
}

function doCharge(handIndex) {
  const p = G.players[0];
  const cardId = p.hand[handIndex];
  // Now need to pick a land
  G.chargingMode = 'pick_land';
  G.selectedCard = {owner: 0, zone: 'hand', index: handIndex};
  log('土地を選んでください（チャージカードを置く）');
  render(); updateHints();
}

function chargeToLand(landInstId) {
  const p = G.players[0];
  const land = p.lands.find(l => l.instanceId === landInstId);
  if (!land || land.chargeCard) { log('その土地にはチャージできません'); return; }
  const hi = G.selectedCard.index;
  const cardId = p.hand[hi];
  p.hand.splice(hi, 1);
  land.chargeCard = cardId;
  land.tapped = false; // untap the land
  G.chargingMode = false;
  G.selectedCard = null;
  log(`チャージ: ${CARD_DB[cardId].name} を土地に置き、土地をアンタップ`);
  // wasure_heichi: draw 1 when charged
  const landCard = CARD_DB[land.cardId];
  if (landCard.chargeDrawTrigger) {
    drawCard(0);
    log('忘れ去られし平地: カードを1枚引く');
  }
  render(); updateHints();
}

function activateChargedLand(player, instId) {
  const p = G.players[player];
  const land = p.lands.find(l => l.instanceId === instId);
  if (!land || !land.chargeCard) return;
  const landCard = CARD_DB[land.cardId];
  if (!landCard.chargedAbility) return;
  const opp = 1-player;

  if (landCard.chargedAbility === 'look3keep1white') {
    // Cost: W3 (1W+3C)
    if (!canAfford(player, {W:1,C:3})) { log('マナ不足 (W+CCC)'); return; }
    payMana(player, {W:1,C:3});
    doLook3Keep1White(player);
    log(`${landCard.name}: 3ルック1(白)`);
    render(); updateHints();
  } else if (landCard.chargedAbility === 'kaizouReturn') {
    // shigen_heichi: OC + tap -> produce WW, send to land deck bottom
    if (!isOCActive(player)) { log('OC未達成'); return; }
    if (land.tapped) { log('タップ済み'); return; }
    land.tapped = true;
    p.mana.W = (p.mana.W||0)+2;
    // Send land to bottom of land deck
    const idx = p.lands.findIndex(l=>l.instanceId===instId);
    p.lands.splice(idx,1);
    p.landDeck.push(land.cardId);
    log(`${landCard.name} 還元: WW追加、土地デッキ底へ`, 'heal');
    render(); updateHints();
  } else if (landCard.chargedAbility === 'damage2opponent') {
    // kemono_heichi: tap -> deal 2 dmg to opponent creature
    if (land.tapped) { log('タップ済み'); return; }
    land.tapped = true;
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 2, player);
        log(`${landCard.name} 還元: 2ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log('対象を選択（2ダメージ）');
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        applyDamageToCreature(opp, targets[0].instanceId, 2, player);
        log(`AI ${landCard.name} 還元: 2ダメージ`, 'damage');
      }
    }
    render(); updateHints();
  } else if (landCard.chargedAbility === 'buffWhiteCreature') {
    // serashia_miyako: tap -> give own white creature +0/+1 permanent
    if (land.tapped) { log('タップ済み'); return; }
    land.tapped = true;
    if (player === 0) {
      G.targetMode = { type:'ownCreature', owner:player, callback:(tgt) => {
        const tc = G.players[player].field.find(x=>x.instanceId===tgt.instId);
        if (tc && CARD_DB[tc.cardId].color === 'W') {
          addPermanentBuff(player, tgt.instId, 0, 1);
          log(`${landCard.name}: 白クリーチャー+0/+1(永続)`);
        } else { log('白クリーチャーを選んでください'); }
        G.targetMode = null; render(); updateHints();
      }};
      log('白クリーチャーを選択（+0/+1永続）');
    } else {
      const whites = G.players[player].field.filter(c=>CARD_DB[c.cardId].color==='W');
      if (whites.length > 0) { addPermanentBuff(player, whites[0].instanceId, 0, 1); log(`AI ${landCard.name}: 白クリーチャー+0/+1`); }
    }
    render(); updateHints();
  }
}

// ============================================================
// COMBAT
// ============================================================
function getEffectivePower(player, inst) {
  const card = CARD_DB[inst.cardId];
  const pb = getPermanentBuff(inst.instanceId);
  return card.power + (inst.tempPower||0) + pb.power + getCXBonus(player, inst);
}
function getEffectiveToughness(player, inst) {
  const card = CARD_DB[inst.cardId];
  const pb = getPermanentBuff(inst.instanceId);
  return card.toughness + (inst.tempToughness||0) + pb.toughness;
}

function toggleAttacker(instId) {
  const p = G.players[0];
  const creature = p.field.find(c => c.instanceId === instId);
  if (!creature) return;
  if (!canCreatureAttack(0, creature)) return;
  const card = CARD_DB[creature.cardId];
  const idx = p.attackers.indexOf(instId);
  if (idx === -1) {
    p.attackers.push(instId);
    if (!card.vigilance) creature.tapped = true;
    log(`攻撃宣言: ${card.name}`);
  } else {
    p.attackers.splice(idx, 1);
    if (!card.vigilance) creature.tapped = false;
  }
  render();
}

function canFlyBlock(attackerInst, blockerInst) {
  const atkCard = CARD_DB[attackerInst.cardId];
  const blkCard = CARD_DB[blockerInst.cardId];
  const atkFlying = atkCard.flying || false;
  const blkFlying = blkCard.flying || false;
  // Flying attacker can only be blocked by flying
  if (atkFlying && !blkFlying) return false;
  // Non-flying blocker can block non-flying
  return true;
}

function aiDeclareBlockers() {
  const ai = G.players[1];
  const player = G.players[0];
  player.blockers = {};
  // Eligible blockers: untapped AI creatures (or bastian OC: can block while tapped)
  const eligibleBlockers = ai.field.filter(c => {
    const card = CARD_DB[c.cardId];
    if (card.ocBlockWhileTapped && isOCActive(1)) return true;
    return !c.tapped;
  });
  let usedBlockers = new Set();
  player.attackers.forEach(atkId => {
    const attacker = player.field.find(c=>c.instanceId===atkId);
    if (!attacker) return;
    const blocker = eligibleBlockers.find(b => !usedBlockers.has(b.instanceId) && canFlyBlock(attacker, b));
    if (blocker) {
      usedBlockers.add(blocker.instanceId);
      player.blockers[atkId] = [blocker.instanceId];
      const atkCard = CARD_DB[attacker.cardId];
      const blkCard = CARD_DB[blocker.cardId];
      log(`AIブロック: ${blkCard.name} が ${atkCard.name} をブロック`);
    }
  });
}

function resolveCombat() {
  const player = G.players[0];
  const ai = G.players[1];
  G.combatBlockersAlive = {};

  // アレスティア passive: if AI has arestia and player attacks, player's creatures all got +1/+1 temp (already applied in startCombat)

  player.attackers.forEach(atkId => {
    const attacker = player.field.find(c => c.instanceId === atkId);
    if (!attacker) return;
    const atkCard = CARD_DB[attacker.cardId];
    const atkPow = getEffectivePower(0, attacker);
    const blockerIds = player.blockers[atkId] || [];

    if (blockerIds.length === 0) {
      // Check kakutou entry turn: can only attack tapped
      if (atkCard.kakutou && attacker.entryTurn === G.turn) {
        // Verify target was tapped - since no blocker and going direct, skip (AI chose no block)
      }
      ai.life -= atkPow;
      showFloatDamage(atkPow, 'ai');
      log(`${atkCard.name} が${atkPow}ダメージを与えた`, 'damage');
    } else {
      blockerIds.forEach(blkId => {
        const blocker = ai.field.find(c => c.instanceId === blkId);
        if (!blocker) return;
        const blkCard = CARD_DB[blocker.cardId];
        const blkPow = getEffectivePower(1, blocker);

        blocker.damage += atkPow;
        attacker.damage += blkPow;

        // serashia_junhei on block: deal 2 damage to attacker
        if (blkCard.onBlock === 'damage2attacker') {
          attacker.damage += 2;
          log(`${blkCard.name} ブロック: 攻撃クリーチャーに2ダメージ`, 'damage');
        }
        // serashia_heishi on block: draw
        if (blkCard.onBlock === 'draw1') {
          drawCard(1);
          log(`AI ${blkCard.name} ブロック: 1ドロー`);
        }
        // serashia_souryo on block: gain 3 life
        if (blkCard.onBlock === 'gain3life') {
          ai.life += 3;
          log(`AI ${blkCard.name} ブロック: ライフ3回復`, 'heal');
        }
        // CX8 souryo block: buff ally
        if (blkCard.cx8Block === 'buff1ally' && getCXValue(1) >= 8) {
          // AI picks strongest ally to buff
          const allies = ai.field.filter(c=>c.instanceId!==blkId);
          if (allies.length > 0) {
            addPermanentBuff(1, allies[0].instanceId, 1, 1);
            log(`AI ${blkCard.name} CX8ブロック: 味方+1/+1`);
          }
        }
        // blockDrawTrigger (介善)
        if (G.blockDrawTrigger) {
          drawCard(0);
          log('介善: ブロック時1ドロー');
        }

        const blockerDied = checkCreatureDeath(1, blkId, 0);
        G.combatBlockersAlive[blkId] = !blockerDied;
      });
      checkCreatureDeath(0, atkId, 1);
    }
  });

  // アレスティア block-completion: if player has arestia and no blockers died -> 2 damage to AI
  const aresInst = player.field.find(c=>CARD_DB[c.cardId].id==='arestia');
  if (aresInst && player.attackers.length > 0) {
    const allBlockers = Object.values(player.blockers).flat();
    const anyDied = allBlockers.some(bid => G.combatBlockersAlive[bid] === false);
    if (allBlockers.length > 0 && !anyDied) {
      ai.life -= 2;
      showFloatDamage(2, 'ai');
      log('アレスティア: ブロッカー全生存 → 2ダメージ', 'damage');
    }
  }

  // Vigilance: untap vigilant attackers
  player.attackers.forEach(atkId => {
    const atk = player.field.find(c=>c.instanceId===atkId);
    if (atk && CARD_DB[atk.cardId].vigilance) { atk.tapped = false; }
  });

  checkDeath();
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.combatStep = null;
  G.attackMode = false;
  G.blockDrawTrigger = false;
  G.phase = 'main';
  render();
  setTimeout(() => endTurn(), 400);
}

function getCXBonus(player, creature) {
  const card = CARD_DB[creature.cardId];
  if (!card.keywords) return 0;
  const cx = getCXValue(player);
  if (card.id === 'bastian' && card.cx8Buff && cx >= 8) return 3;
  return 0;
}

function getCXValue(player) {
  const p = G.players[player];
  let landCount = p.lands.length;
  let chargeCount = p.lands.filter(l => l.chargeCard).length;
  return landCount + chargeCount;
}

function isOCActive(player) {
  return getCXValue(player) >= 10;
}

function passPriority() {
  if (G.stack.length > 0) {
    resolveStack();
  } else {
    log('スタックは空です');
  }
}

function resolveStack() {
  if (G.stack.length === 0) return;
  const item = G.stack.pop();
  log(`スタックを解決: ${item.name}`);
  if (item.resolve) item.resolve();
  render();
}

// ============================================================
// MULLIGAN
// ============================================================
function doMulligan() {
  const p = G.players[0];
  if (p.mulliganUsed) { log('マリガンは1回のみ使用できます'); return; }
  p.mulliganUsed = true;
  document.getElementById('btn-mulligan').disabled = true;

  // Show mulligan modal - choose cards to return
  const cards = p.hand.map((cid, i) => ({cid, i}));
  let chosen = new Set();

  const html = `
    <p style="margin-bottom:10px; font-size:11px;">戻すカードを選択（選択したカードをデッキの底に戻し、同じ枚数ドロー）</p>
    <div style="display:flex; flex-wrap:wrap; gap:6px;" id="mulligan-cards"></div>
    <button onclick="confirmMulligan()" style="margin-top:10px; width:100%;">確認</button>
  `;
  showModal('マリガン', html);

  const container = document.getElementById('mulligan-cards');
  cards.forEach(({cid, i}) => {
    const card = CARD_DB[cid];
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.style.cursor = 'pointer';
    el.innerHTML = buildCardHTML(card);
    el.onclick = () => {
      if (chosen.has(i)) { chosen.delete(i); el.style.opacity = '1'; }
      else { chosen.add(i); el.style.opacity = '0.4'; }
      window._mulliganChosen = chosen;
    };
    container.appendChild(el);
  });
  window._mulliganHand = p.hand;
  window._mulliganChosen = chosen;
}

function confirmMulligan() {
  const p = G.players[0];
  const chosen = window._mulliganChosen || new Set();
  const count = chosen.size;
  if (count === 0) { closeModal(); return; }
  // Return chosen cards to deck bottom
  const newHand = [];
  p.hand.forEach((cid, i) => {
    if (chosen.has(i)) { p.deck.push(cid); }
    else { newHand.push(cid); }
  });
  p.hand = newHand;
  // Shuffle deck
  p.deck = shuffle(p.deck);
  // Draw same count
  for (let i = 0; i < count; i++) drawCard(0);
  closeModal();
  log(`マリガン: ${count}枚入れ替え`);
  render();
}

// ============================================================
// AI LOGIC
// ============================================================
function aiTurn() {
  if (G.phase === 'ended') return;
  const ai = G.players[1];
  log('AIのターン...', 'important');

  // Tap lands for mana
  ai.lands.forEach(land => {
    if (!land.tapped) tapLandForMana(1, land.instanceId);
  });

  // Play creatures/spells
  let played = true;
  let attempts = 0;
  while (played && attempts < 20) {
    played = false; attempts++;
    const playable = ai.hand.map((cid, i) => ({cid, i, card: CARD_DB[cid]}))
      .filter(({card}) => card.type !== 'land' && canAfford(1, card.cost))
      .sort((a,b) => totalCost(b.card.cost) - totalCost(a.card.cost));

    if (playable.length > 0) {
      const {cid, i, card} = playable[0];
      if (card.type === 'creature' && ai.field.length < 5) {
        payMana(1, card.cost);
        ai.hand.splice(i, 1);
        const inst = newInstance(cid);
        inst.sick = true;
        inst.entryTurn = G.turn;
        ai.field.push(inst);
        log(`AI: ${card.name} を召喚`);
        fireETB(1, inst.instanceId);
        played = true;
        render();
      } else if (card.type === 'spell') {
        aiPlaySpell(card, i);
        played = true;
        render();
      }
    }
  }

  setTimeout(() => { aiAttack(); }, 600);
}

function totalCost(cost) {
  return Object.values(cost).reduce((a,b)=>a+b,0);
}

function aiPlaySpell(card, handIndex) {
  const ai = G.players[1];
  const player = G.players[0];
  payMana(1, card.cost);
  ai.hand.splice(handIndex, 1);
  ai.graveyard.push(card.id);

  if (card.effect === 'junigeki') {
    // Target player's strongest creature for 2 damage
    const targets = player.field;
    if (targets.length > 0) {
      const tgt = targets.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI: ${card.name} でプレイヤークリーチャーに2ダメージ`, 'damage');
      // Buff own creature +0/+1
      if (ai.field.length > 0) {
        const ally = ai.field[0];
        ally.tempToughness = (ally.tempToughness||0)+1;
        G.tempBuffs.push({instanceId:ally.instanceId,power:0,toughness:1});
      }
    }
  } else if (card.effect === 'kaizen') {
    // AI version: choice A (damage) if opponent has creatures, else B (mustAttack)
    if (player.field.length > 0) {
      const tgt = player.field.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI 介善(A): プレイヤークリーチャーに2ダメージ`, 'damage');
    }
    G.blockDrawTrigger = true; // applies to whoever blocks this turn (AI turn, so player blocking AI attacks)
  } else {
    log(`AI: ${card.name} を使用`);
  }
  checkDeath();
}

function aiAttack() {
  if (G.phase === 'ended') return;
  const ai = G.players[1];
  const player = G.players[0];

  // Determine attackers: must attack if mustAttack, also willing attackers
  let attackers = [];
  ai.field.forEach(c => {
    const card = CARD_DB[c.cardId];
    // Check if can attack
    if (G.cantAttackPermanent.has(c.instanceId)) return;
    if (c.tapped && !card.vigilance) return;
    if (c.sick) {
      // kakutou can attack tapped player creatures on entry turn
      if (card.kakutou && c.entryTurn === G.turn && player.field.some(pc=>pc.tapped)) {
        attackers.push(c);
      }
      return;
    }
    // Check arestia passive: mustAttack
    if (c.mustAttack) { attackers.push(c); return; }
    attackers.push(c);
  });

  if (attackers.length === 0) { setTimeout(() => endTurn(), 300); return; }

  // アレスティア passive: if player has arestia, player creatures get +1/+1 temp on AI attack
  const playerHasArestia = player.field.some(c=>CARD_DB[c.cardId].id==='arestia');
  if (playerHasArestia) {
    player.field.forEach(c=>{c.tempPower=(c.tempPower||0)+1;c.tempToughness=(c.tempToughness||0)+1;});
    log('アレスティア: プレイヤークリーチャー全体+1/+1（ターン終了時まで）','important');
  }

  log('AI攻撃！');
  const usedBlockers = new Set();
  const aiAttackerIds = [];
  const aiBlockerMap = {}; // atkId -> blkId

  attackers.forEach(c => {
    const card = CARD_DB[c.cardId];
    if (!card.vigilance) c.tapped = true;
    aiAttackerIds.push(c.instanceId);

    // kakutou on entry: can only attack tapped player creatures
    let validTargets;
    if (card.kakutou && c.entryTurn === G.turn) {
      validTargets = player.field.filter(pc=>pc.tapped);
    } else {
      validTargets = null; // can attack player directly or be blocked
    }

    const pow = getEffectivePower(1, c);
    // Find a blocker
    const availBlockers = player.field.filter(b=>!usedBlockers.has(b.instanceId) && !b.tapped && canFlyBlock(c, b));
    const blocker = availBlockers.length > 0 ? availBlockers[0] : null;

    if (!blocker) {
      // If kakutou on entry, can only attack tapped targets; if none unblocked, no damage
      if (card.kakutou && c.entryTurn === G.turn && (validTargets && validTargets.length === 0)) {
        log(`${card.name} (格闘): タップ中のクリーチャーなし、攻撃不可`);
        return;
      }
      player.life -= pow;
      showFloatDamage(pow, 'player');
      log(`AI ${card.name} が${pow}ダメージ！`, 'damage');
    } else {
      usedBlockers.add(blocker.instanceId);
      aiBlockerMap[c.instanceId] = blocker.instanceId;
      const blkCard = CARD_DB[blocker.cardId];
      const blkPow = getEffectivePower(0, blocker);
      log(`AI ${card.name} 攻撃 -> ${blkCard.name} ブロック`);

      blocker.damage += pow;
      c.damage += blkPow;

      // on-block triggers for blocker
      if (blkCard.onBlock === 'draw1') { drawCard(0); log(`${blkCard.name} ブロック: 1ドロー`); }
      if (blkCard.onBlock === 'gain3life') { player.life += 3; log(`${blkCard.name} ブロック: ライフ3回復`,'heal'); }
      if (blkCard.onBlock === 'damage2attacker') { c.damage += 2; log(`${blkCard.name} ブロック: 攻撃クリーチャーに2ダメージ`,'damage'); }
      if (blkCard.cx8Block === 'buff1ally' && getCXValue(0) >= 8) {
        const allies = player.field.filter(pc=>pc.instanceId!==blocker.instanceId);
        if (allies.length>0){addPermanentBuff(0,allies[0].instanceId,1,1);log(`${blkCard.name} CX8: 味方+1/+1`);}
      }
      if (G.blockDrawTrigger) { drawCard(1); log('介善: ブロック時1ドロー'); }

      checkCreatureDeath(0, blocker.instanceId, 1);
      checkCreatureDeath(1, c.instanceId, 0);
    }
  });

  // アレスティア AI turn block-completion: if player attacked (this is AI turn, so it's reverse)
  // This fires when AI attacks and player's arestia condition: handled above differently
  // Actually アレスティア block-completion: fires after player's OWN creatures block
  // During AI attack, player's creatures are blockers -> check if none died -> deal 2 to AI
  if (playerHasArestia) {
    const anyBlockerDied = Array.from(usedBlockers).some(bid => {
      return !player.field.some(c=>c.instanceId===bid);
    });
    if (usedBlockers.size > 0 && !anyBlockerDied) {
      ai.life -= 2;
      showFloatDamage(2, 'ai');
      log('アレスティア: ブロッカー全生存 → 2ダメージ', 'damage');
    }
  }

  // Vigilance: untap vigilant AI attackers
  attackers.forEach(c => { if(CARD_DB[c.cardId].vigilance) c.tapped=false; });

  checkDeath();
  G.blockDrawTrigger = false;
  render();
  setTimeout(() => endTurn(), 600);
}

// ============================================================
// RENDERING
// ============================================================
function render() {
  if (G.phase === 'ended' && !G._endedRendered) {
    G._endedRendered = true;
  }
  renderHand(0);
  renderHand(1);
  renderField(0);
  renderField(1);
  renderLands(0);
  renderLands(1);
  renderInfoBar();
  renderStack();
  updateCounts();
}

function buildCardHTML(card, inst, playerOwner) {
  let ptHtml = '';
  if (card.type === 'creature' && inst) {
    const pb = getPermanentBuff(inst.instanceId);
    const p2 = playerOwner !== undefined ? playerOwner : 0;
    const pw = card.power + (inst.tempPower||0) + pb.power + getCXBonus(p2, inst);
    const th = card.toughness + (inst.tempToughness||0) + pb.toughness;
    const dmgStr = inst.damage > 0 ? `-${inst.damage}` : '';
    ptHtml = `<div class="card-pt">${pw}/${th}${dmgStr}</div>`;
  } else if (card.type === 'creature') {
    ptHtml = `<div class="card-pt">${card.power}/${card.toughness}</div>`;
  }
  const costStr = card.cost ? `<div class="card-cost">${costToString(card.cost)}</div>` : '';
  const keywords = card.keywords && card.keywords.length ? `<div class="card-keywords">${card.keywords.join(', ')}</div>` : '';
  const dmg = inst && inst.damage > 0 ? `<div class="damage-counter">${inst.damage}</div>` : '';
  const chg = inst && inst.chargeCard ? `<div class="charge-indicator">CG</div>` : '';
  return `
    <div class="card-art">${card.icon}</div>
    <div class="card-bottom">
      <div class="card-name">${card.name}</div>
      <div class="card-type-line">${card.type === 'creature' ? card.subtype : card.type}</div>
      ${keywords}
      ${ptHtml}
    </div>
    ${costStr}${dmg}${chg}
  `;
}

function renderHand(player) {
  const zone = document.getElementById(player === 0 ? 'player-hand' : 'ai-hand');
  zone.innerHTML = '';
  const p = G.players[player];

  p.hand.forEach((cardId, i) => {
    const card = CARD_DB[cardId];
    const el = document.createElement('div');
    if (player === 1) {
      el.className = 'card face-down';
    } else {
      el.className = `card color-${card.color}`;
      // Determine if playable
      const isMain = G.phase === 'main' && G.activePlayer === 0;
      const isQuick = card.keywords && card.keywords.includes('Quick');
      const affordable = card.type !== 'land' && canAfford(0, card.cost);
      if ((isMain || isQuick) && affordable) el.classList.add('playable');
      el.innerHTML = buildCardHTML(card);
      el.onclick = () => handleHandClick(player, i);
      el.title = card.text || card.name;
    }
    el.style.animation = 'slideIn 0.2s ease';
    zone.appendChild(el);
  });
}

function renderField(player) {
  const zone = document.getElementById(player === 0 ? 'player-field' : 'ai-field');
  zone.innerHTML = '';
  const p = G.players[player];

  for (let slot = 0; slot < 5; slot++) {
    const slotEl = document.createElement('div');
    slotEl.className = 'field-slot';
    if (slot < p.field.length) {
      const inst = p.field[slot];
      const card = CARD_DB[inst.cardId];
      const el = document.createElement('div');
      el.className = `card color-${card.color}`;
      if (inst.tapped) el.classList.add('tapped');
      // Attack mode highlights
      if (player === 0 && G.attackMode && G.combatStep === 'declare_attackers') {
        if (canCreatureAttack(0, inst)) el.classList.add('attackable');
        if (G.players[0].attackers.includes(inst.instanceId)) el.classList.add('selected');
      }
      // Target mode
      if (G.targetMode) {
        const tm = G.targetMode.type;
        if (tm === 'creature' || tm === 'any') el.classList.add('targetable');
        if (tm === 'opponentCreature' && player !== (G.targetMode.sourcePlayer||0)) el.classList.add('targetable');
        if (tm === 'ownCreature' && player === (G.targetMode.owner||0)) el.classList.add('targetable');
      }
      el.innerHTML = buildCardHTML(card, inst, player);
      el.onclick = () => handleFieldClick(player, inst.instanceId);
      slotEl.appendChild(el);
    } else {
      slotEl.textContent = '';
    }
    zone.appendChild(slotEl);
  }
}

function renderLands(player) {
  const zone = document.getElementById(player === 0 ? 'player-lands' : 'ai-lands');
  zone.innerHTML = '';
  const p = G.players[player];

  p.lands.forEach(land => {
    const card = CARD_DB[land.cardId];
    const el = document.createElement('div');
    el.className = `land-card color-${card.color}`;
    if (land.tapped) el.classList.add('tapped');
    if (G.chargingMode === 'pick_land' && player === 0 && !land.chargeCard) el.classList.add('selected');
    el.innerHTML = `${card.icon}<div class="land-name">${card.name}</div>`;
    if (land.chargeCard) {
      const pip = document.createElement('div');
      pip.className = 'charge-pip';
      pip.textContent = '★';
      pip.title = `チャージ: ${CARD_DB[land.chargeCard].name}`;
      el.appendChild(pip);
    }
    el.onclick = () => handleLandClick(player, land.instanceId);
    zone.appendChild(el);
  });
}

function renderInfoBar() {
  const p0 = G.players[0];
  const p1 = G.players[1];

  const lifeEl = document.getElementById('player-life');
  lifeEl.textContent = `❤️ ${p0.life}`;
  lifeEl.className = `life-display${p0.life <= 5 ? ' low' : ''}`;

  const aiLifeEl = document.getElementById('ai-life');
  aiLifeEl.textContent = `❤️ ${p1.life}`;
  aiLifeEl.className = `life-display${p1.life <= 5 ? ' low' : ''}`;

  const phases = { untap:'アンタップ', draw:'ドロー', main:'メイン', combat:'戦闘', end:'エンド', ended:'終了' };
  document.getElementById('phase-name').textContent = phases[G.phase] || G.phase;

  const cx = getCXValue(0);
  document.getElementById('cx-value').textContent = cx;
  const oc = isOCActive(0);
  const ocEl = document.getElementById('oc-status');
  ocEl.textContent = `OC: ${oc ? '✓' : '✗'}`;
  ocEl.style.background = oc ? '#2a4a2a' : '#4a1a2a';
  ocEl.style.color = oc ? '#44ff88' : '#ff88aa';

  document.getElementById('turn-indicator').textContent = `ターン ${G.turn} (${G.activePlayer===0?'自分':'AI'})`;

  // Mana display
  const manaEl = document.getElementById('mana-display');
  manaEl.innerHTML = '';
  const colors = ['R','U','G','W','B','C'];
  colors.forEach(c => {
    const amt = p0.mana[c] || 0;
    if (amt > 0) {
      for (let i = 0; i < amt; i++) {
        const pip = document.createElement('div');
        pip.className = `mana-pip mana-${c}`;
        pip.textContent = c;
        manaEl.appendChild(pip);
      }
    }
  });
}

function renderStack() {
  const el = document.getElementById('stack-items');
  el.innerHTML = '';
  G.stack.forEach(item => {
    const div = document.createElement('div');
    div.className = 'stack-item';
    div.textContent = item.name;
    el.appendChild(div);
  });
}

function updateCounts() {
  document.getElementById('player-deck-count').textContent = G.players[0].deck.length;
  document.getElementById('player-land-deck-count').textContent = G.players[0].landDeck.length;
  document.getElementById('ai-deck-count').textContent = G.players[1].deck.length;
  document.getElementById('ai-land-deck-count').textContent = G.players[1].landDeck.length;
}

// ============================================================
// CLICK HANDLERS
// ============================================================
function handleHandClick(player, index) {
  if (player !== 0) return; // Can't click AI hand
  if (G.activePlayer !== 0 && G.phase !== 'ended') {
    // Allow quick spells
    const cardId = G.players[0].hand[index];
    const card = CARD_DB[cardId];
    if (!(card.keywords && card.keywords.includes('Quick'))) {
      log('AIのターン中は使用できません（Quickのみ可能）');
      return;
    }
  }

  if (G.chargingMode === true) {
    doCharge(index);
    return;
  }

  playCardFromHand(player, index);
}

function handleFieldClick(player, instId) {
  // Target mode
  if (G.targetMode) {
    const tm = G.targetMode.type;
    if (tm === 'creature' || tm === 'any') {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
    if (tm === 'opponentCreature' && player !== 0) {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
    if (tm === 'ownCreature' && player === (G.targetMode.owner||0)) {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
  }

  // Attack mode (player's creatures)
  if (player === 0 && G.attackMode && G.combatStep === 'declare_attackers') {
    toggleAttacker(instId);
    return;
  }

  // Activated abilities on player's own creatures
  if (player === 0 && G.activePlayer === 0 && G.phase === 'main') {
    const p = G.players[0];
    const inst = p.field.find(c => c.instanceId === instId);
    if (!inst) return;
    const card = CARD_DB[inst.cardId];
    // アレスティア 還元: untap own creature
    if (card.id === 'arestia' && !inst.tapped) {
      G.targetMode = { type:'ownCreature', owner:0, callback:(tgt) => {
        const tc = G.players[0].field.find(x=>x.instanceId===tgt.instId);
        if (tc && tc.instanceId !== instId) { tc.tapped = false; log('アレスティア 還元: クリーチャーをアンタップ'); }
        G.targetMode = null; render(); updateHints();
      }};
      log('アレスティア 還元: アンタップするクリーチャーを選択');
      render(); updateHints();
    }
  }
}

function handleLandClick(player, instId) {
  if (G.chargingMode === 'pick_land' && player === 0) {
    chargeToLand(instId);
    return;
  }
  if (G.targetMode) return;
  if (player !== 0) return;

  const p = G.players[0];
  const land = p.lands.find(l=>l.instanceId===instId);
  if (!land) return;

  const landCard = CARD_DB[land.cardId];

  // If land has charged ability and is charged, show choice: tap for mana or use ability
  if (land.chargeCard && landCard.chargedAbility && G.activePlayer === 0 && G.phase === 'main') {
    if (!land.tapped) {
      // Show choice: mana or special
      const html = `
        <p style="margin-bottom:10px;">${landCard.name} の使用方法を選択:</p>
        <button onclick="closeModal(); tapLandForMana(0,${instId}); render();" style="width:100%;margin-bottom:8px;padding:8px;">マナを追加 (${landCard.produces||'C'})</button>
        <button onclick="closeModal(); activateChargedLand(0,${instId});" style="width:100%;padding:8px;">チャージ能力: ${landCard.text.split('\n')[1]||'特殊能力'}</button>
      `;
      showModal(landCard.name, html);
      return;
    }
  }

  // Tap for mana
  if (G.activePlayer === 0) {
    tapLandForMana(0, instId);
  }
}

// Direct damage target on life display
document.getElementById('ai-life').addEventListener('click', () => {
  if (G.targetMode && G.targetMode.type === 'any') {
    G.targetMode.callback({type:'player', player:1});
  }
});

// ============================================================
// FLOATING DAMAGE
// ============================================================
function showFloatDamage(amount, target) {
  const el = document.createElement('div');
  el.className = 'float-damage';
  el.style.color = '#ff4444';
  el.textContent = `-${amount}`;
  const zone = document.getElementById(target === 'player' ? 'player-field' : 'ai-field');
  const rect = zone.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2) + 'px';
  el.style.top = (rect.top + rect.height/2) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ============================================================
// MODAL
// ============================================================
function showModal(title, content) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-cards').innerHTML = '';
  document.getElementById('modal').classList.add('active');
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// ============================================================
// HINTS
// ============================================================
function clearTargetMode() {
  if (G.targetMode) {
    G.targetMode = null;
    log('対象選択をキャンセルしました');
  }
  G.chargingMode = false;
  G.selectedCard = null;
}

function updateHints() {
  const hint = document.getElementById('action-hint');
  if (G.targetMode) {
    hint.textContent = '対象を選択中...（キャンセルはフェイズ終了ボタン）';
    hint.style.color = '#ffcc00';
  } else if (G.chargingMode === true) {
    hint.textContent = '手札からチャージするカードを選択';
    hint.style.color = '#ffaa00';
  } else if (G.chargingMode === 'pick_land') {
    hint.textContent = '土地を選択してチャージ';
    hint.style.color = '#ffaa00';
  } else if (G.attackMode && G.combatStep === 'declare_attackers') {
    hint.textContent = '攻撃クリーチャーを選択→フェイズ終了で攻撃確定';
    hint.style.color = '#ff8800';
  } else if (G.phase === 'main' && G.activePlayer === 0) {
    hint.textContent = '土地をクリックでマナ、手札をクリックでプレイ';
    hint.style.color = '#6688ff';
  } else if (G.activePlayer === 1) {
    hint.textContent = 'AIのターン...';
    hint.style.color = '#888';
  } else {
    hint.textContent = '';
  }

  const btnCharge = document.getElementById('btn-charge');
  btnCharge.disabled = G.activePlayer !== 0 || G.phase !== 'main';
  const btnEnd = document.getElementById('btn-end-phase');
  btnEnd.disabled = G.activePlayer !== 0 || G.phase === 'ended';
}

// ============================================================
// LOG
// ============================================================
function log(msg, type) {
  const el = document.getElementById('log');
  const p = document.createElement('p');
  if (type) p.className = type;
  p.textContent = msg;
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
}

// ============================================================
// INIT
// ============================================================
initGame();
</script>
