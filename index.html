}
// 後方互換
function bastianChooseKakutou(instanceId) { startKakutou(0, instanceId); }

function doLook3Keep1White(player) {
  const p = G.players[player];
  if (p.deck.length === 0) return;
  const top3 = p.deck.splice(0, Math.min(3, p.deck.length));
  const whites = top3.filter(cid => CARD_DB[cid] && CARD_DB[cid].color === 'W');

  if (player === 1) {
    // AI: keep a white card if any
    if (whites.length > 0) {
      p.hand.push(whites[0]);
      const rest = top3.filter(cid=>cid!==whites[0]);
      rest.forEach(cid=>p.deck.push(cid));
      log(`AI 3ルック1(白): 白カードをキープ`);
    } else {
      top3.forEach(cid=>p.deck.push(cid));
      log(`AI 3ルック1(白): 白カードなし`);
    }
    return;
  }

  // Player: show modal
  let html = `<p style="margin-bottom:10px;">白カードを1枚選んで手札に加えてください（白以外は選択不可）:</p>
    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="look3-cards"></div>
    <button onclick="look3NoKeep()" style="margin-top:10px; width:100%;">白カードなし/パス（全て底へ）</button>`;
  showModal('3ルック1(白)', html);
  window._look3Cards = top3;
  window._look3Player = player;

  const container = document.getElementById('look3-cards');
  top3.forEach((cid, i) => {
    const card = CARD_DB[cid];
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.innerHTML = buildCardHTML(card);
    const isWhite = card.color === 'W';
    if (!isWhite) { el.style.opacity = '0.4'; el.style.cursor = 'default'; }
    else {
      el.onclick = () => {
        p.hand.push(cid);
        const rest = top3.filter(c2=>c2!==cid);
        rest.forEach(c2=>p.deck.push(c2));
        log(`3ルック1: ${card.name} をキープ`);
        closeModal(); render(); updateHints();
      };
    }
    container.appendChild(el);
  });
}
function look3NoKeep() {
  const top3 = window._look3Cards || [];
  const player = window._look3Player || 0;
  top3.forEach(cid=>G.players[player].deck.push(cid));
  log('3ルック1: 全て底へ');
  closeModal(); render(); updateHints();
}

function addPermanentBuff(player, instanceId, power, toughness) {
  G.permanentBuffs.push({instanceId, power, toughness});
}

function addTempBuff(player, instanceId, power, toughness) {
  const inst = G.players[player].field.find(c => c.instanceId === instanceId);
  if (!inst) return;
  inst.tempPower  = (inst.tempPower  || 0) + power;
  inst.tempToughness = (inst.tempToughness || 0) + toughness;
  G.tempBuffs.push({instanceId, power, toughness});
}

function getPermanentBuff(instanceId) {
  let pw=0, th=0;
  G.permanentBuffs.forEach(b=>{ if(b.instanceId===instanceId){pw+=b.power;th+=b.toughness;} });
  return {power:pw, toughness:th};
}

function applyDamageToCreature(player, instId, amount, sourcePlayer) {
  const pf = G.players[player];
  const c = pf.field.find(x=>x.instanceId===instId);
  if (!c) return;
  c.damage += amount;
  checkCreatureDeath(player, instId, sourcePlayer);
}

function applyDamage3(sourcePlayer, target) {
  if (target.type === 'player') {
    G.players[target.player].life -= 3;
    showFloatDamage(3, target.player === 0 ? 'player' : 'ai');
    checkDeath();
  } else if (target.type === 'creature') {
    applyDamageToCreature(target.player, target.instId, 3, sourcePlayer);
  }
}

function checkCreatureDeath(player, instId, sourcePlayer) {
  const p = G.players[player];
  const idx = p.field.findIndex(x => x.instanceId === instId);
  if (idx === -1) return false;
  const c = p.field[idx];
  const card = CARD_DB[c.cardId];
  const permBuff = getPermanentBuff(c.instanceId);
  const toughness = card.toughness + (c.tempToughness||0) + permBuff.toughness + getCXBonus(player, c).toughness;
  const dead = c.damage >= toughness;
  if (dead) {
    p.field.splice(idx, 1);
    p.graveyard.push(c.cardId);
    log(`${card.name} が破壊された`, 'damage');
    return true;
  }
  return false;
}

function checkDeath() {
  for (let i = 0; i < 2; i++) {
    if (G.players[i].life <= 0) { endGame(1 - i); }
  }
}

function endGame(winner) {
  const who = winner === 0 ? 'あなたの' : 'AIの';
  log(`ゲーム終了！ ${who}勝利！`, 'important');
  showModal('ゲーム終了', `<p style="font-size:24px; text-align:center; margin:20px 0;">${who}勝利！</p><button onclick="location.reload()" style="width:100%;padding:10px;">もう一度プレイ</button>`);
  G.phase = 'ended';
}

// ============================================================
// PHASE MANAGEMENT
// ============================================================
function endPhase() {
  if (NET_MODE === 'guest' && netCanAct()) { netSendAction('endPhase', {}); return; }
  if (G.phase === 'ended') return;
  // Open priority window for non-active player before ending phase
  if (!G.awaitingPriority && !G._skipPriorityWindow && !G.playerBlockMode) {
    const opponent = 1 - G.activePlayer;
    G._skipPriorityWindow = true;
    openPriorityWindow(opponent, () => {
      G._skipPriorityWindow = false;
      endPhase();
    });
    return;
  }
  G._skipPriorityWindow = false;
  clearTargetMode();

  if (G.phase === 'main' && G.activePlayer === 0) {
    // mustAttackクリーチャーが残っていれば強制攻撃
    const mustAtkers = G.players[0].field.filter(c =>
      c.mustAttack && canCreatureAttack(0, c)
    );
    if (mustAtkers.length > 0) {
      log(`⚠️ ${CARD_DB[mustAtkers[0].cardId].name} は攻撃しなければなりません（アレスティア効果）`, 'important');
      startSingleAttack(0, mustAtkers[0].instanceId);
      return;
    }
    endTurn();
    return;
  }

  // プレイヤーブロック確定 (AI turn: player assigns blockers for one AI attacker)
  if (G.playerBlockMode) {
    G.playerBlockMode = false;
    G.selectedBlockerToAssign = null;
    render();
    setTimeout(() => resolveAICombat(), 300);
    return;
  }

  endTurn();
}

function canCreatureAttack(player, inst) {
  const card = CARD_DB[inst.cardId];
  if (G.cantAttackPermanent.has(inst.instanceId)) return false;
  if (inst.tapped) return false;
  if (!inst.sick) return true;
  // 格闘: 出たターンは状態問わず相手クリーチャーにのみ攻撃できる
  if (card.kakutou && inst.entryTurn === G.turn) {
    return G.players[1-player].field.length > 0;
  }
  return false;
}

function kakutouTargetsOnly(player) {
  // Returns true if this attacker should only target tapped creatures
  // Used at declaration time for kakutou creatures on entry turn
  return false; // resolved in combat - kakutou on entry can only hit tapped
}

function startCombat() {
  G.phase = 'combat';
  G.combatStep = 'declare_attackers';
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.attackMode = true;

  // アレスティア passive: if AI has arestia and player declares attackers, player's creatures get +1/+1 temp
  // Applied once per attack declaration (when first attacker is added, handled here preemptively)
  const aiHasArestia = G.players[1].field.some(c=>CARD_DB[c.cardId].id==='arestia');
  if (aiHasArestia && !G.arestiaBuffActive) {
    G.players[0].field.forEach(c => addPermanentBuff(0, c.instanceId, 1, 1));
    G.arestiaBuffActive = true;
    log('アレスティア: 自分クリーチャー全体+1/+1（永続）', 'important');
  }

  log('攻撃クリーチャーを選択してください');
  render(); updateHints();
}

function endCombat() {
  G.attackMode = false;
  G.blockMode = false;
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.combatStep = null;
  G.combatArrows = [];
  G.phase = 'main';
  endTurn();
}

// ============================================================
// SINGLE CREATURE ATTACK (main phase, one at a time)
// ============================================================
function startSingleAttack(player, atkInstId) {
  const p = G.players[player];
  const opp = 1 - player;
  const inst = p.field.find(c => c.instanceId === atkInstId);
  if (!inst) return;
  const card = CARD_DB[inst.cardId];

  // Tap attacker (vigilance stays untapped)
  if (!card.vigilance) inst.tapped = true;

  G.combatArrows = [{fromId: atkInstId, toId: null, color: '#ff8800'}];

  // アレスティア passive: 攻撃宣言時、守備側がアレスティアを持っていれば守備側全クリーチャー+1/+1
  const oppHasArestia = G.players[opp].field.some(c => CARD_DB[c.cardId].id === 'arestia');
  if (oppHasArestia && !G.arestiaBuffActive) {
    G.players[opp].field.forEach(c => addTempBuff(opp, c.instanceId, 1, 1));
    G.arestiaBuffActive = true;
    log('アレスティア: 全クリーチャー+1/+1（ターン終了時まで）');
  }

  // 格闘: select target creature first, then priority window after target chosen
  if (card.kakutou && inst.entryTurn === G.turn) {
    const reachable = G.players[opp].field.filter(c => card.flying || !CARD_DB[c.cardId].flying);
    if (reachable.length === 0) {
      log(`${card.name} 格闘: 対象クリーチャーがいません`);
      if (!card.vigilance) inst.tapped = false;
      G.combatArrows = [];
      render(); updateHints(); return;
    }
    G.kakutouTargetMode = true;
    G.pendingKakutouInstId = atkInstId;
    G.kakutouTargets = {};
    log(`${card.name} 格闘: 攻撃するAIクリーチャーを選択してください`);
    render(); updateHints();
    return;
  }

  // Normal attack: open priority window for non-turn player before combat resolves
  log(`${card.name} が攻撃宣言`);
  render();
  openPriorityWindow(opp, () => {
    // After priority window: check attacker still alive
    const stillAlive = G.players[player].field.find(c => c.instanceId === atkInstId);
    if (!stillAlive) {
      log('攻撃クリーチャーが破壊されたため攻撃中止');
      G.combatArrows = [];
      render(); updateHints();
      if (player === 1) setTimeout(() => continueAIAttack(), 300);
      return;
    }
    const aiBlocker = pickAIBlockerFor(player, atkInstId);
    if (aiBlocker) {
      G.combatArrows = [{fromId: atkInstId, toId: aiBlocker.instanceId, color: '#ff4444'}];
      render();
      setTimeout(() => resolveSingleCombat(player, atkInstId, null, aiBlocker.instanceId), 400);
    } else {
      resolveSingleCombat(player, atkInstId, null, null);
    }
  });
}

function pickAIBlockerFor(atkPlayer, atkInstId) {
  const opp = 1 - atkPlayer;
  const oppField = G.players[opp].field;
  const atkInst = G.players[atkPlayer].field.find(c => c.instanceId === atkInstId);
  if (!atkInst) return null;
  const eligible = oppField.filter(b => {
    const bc = CARD_DB[b.cardId];
    return (!b.tapped || (bc.ocBlockWhileTapped && isOCActive(opp))) && canFlyBlock(atkInst, b);
  });
  if (!eligible.length) return null;
  // 評価スコアで最善ブロッカーを選択
  let bestBlocker = null, bestVal = -Infinity;
  for (const b of eligible) {
    if (!aiShouldBlock(atkInst, b, atkPlayer)) continue;
    const atkPow = getEffectivePower(atkPlayer, atkInst);
    const blkPow = getEffectivePower(opp, b);
    const blkTou = getEffectiveToughness(opp, b);
    const atkTou = getEffectiveToughness(atkPlayer, atkInst);
    const bSurvives = (blkTou - b.damage) > atkPow;
    const aDies = (atkTou - atkInst.damage) <= blkPow;
    const val = (aDies ? AI_WEIGHTS.fieldPower * atkPow + AI_WEIGHTS.fieldCount : 0)
              - (bSurvives ? 0 : AI_WEIGHTS.fieldPower * blkPow + AI_WEIGHTS.fieldCount);
    if (val > bestVal) { bestVal = val; bestBlocker = b; }
  }
  return bestBlocker;
}

function resolveSingleCombat(atkPlayer, atkInstId, kakutouTargetId, blockerInstId) {
  const opp = 1 - atkPlayer;
  const atkInst = G.players[atkPlayer].field.find(c => c.instanceId === atkInstId);
  if (!atkInst) {
    G.combatArrows = []; render();
    if (atkPlayer === 1) setTimeout(() => continueAIAttack(), 300);
    return;
  }
  const atkCard = CARD_DB[atkInst.cardId];
  const atkPow = getEffectivePower(atkPlayer, atkInst);

  if (kakutouTargetId) {
    // 格闘: mutual damage with target creature
    const tgtInst = G.players[opp].field.find(c => c.instanceId === kakutouTargetId);
    if (tgtInst) {
      const tgtPow = getEffectivePower(opp, tgtInst);
      tgtInst.damage += atkPow;
      atkInst.damage += tgtPow;
      log(`${atkCard.name} 格闘 → ${CARD_DB[tgtInst.cardId].name}: ${atkPow}ダメージ交換`, 'damage');
      checkCreatureDeath(opp, kakutouTargetId, atkPlayer);
      checkCreatureDeath(atkPlayer, atkInstId, opp);
    }
  } else if (blockerInstId) {
    // Blocked: mutual damage
    const blkInst = G.players[opp].field.find(c => c.instanceId === blockerInstId);
    if (blkInst) {
      const blkCard = CARD_DB[blkInst.cardId];
      const blkPow = getEffectivePower(opp, blkInst);
      blkInst.damage += atkPow;
      atkInst.damage += blkPow;
      log(`${atkCard.name} vs ${blkCard.name}: ${atkPow}/${blkPow}ダメージ交換`, 'damage');
      // onBlock triggers
      let _damage2needsTarget = false;
      if (blkCard.onBlock === 'damage2attacker') {
        if (opp === 0) {
          // プレイヤーのブロッカー: 対象を選んで2ダメージ（後でcheckCreatureDeath後に対象確認）
          _damage2needsTarget = true;
        } else {
          atkInst.damage += 2;
          log(`${blkCard.name}: 攻撃クリーチャーに2ダメージ`, 'damage');
        }
      }
      if (blkCard.onBlock === 'draw1') { drawCard(opp); log(`${blkCard.name}: 1ドロー`); }
      if (blkCard.onBlock === 'gain3life') { G.players[opp].life += 3; log(`${blkCard.name}: ライフ+3`); }
      if (blkCard.cx8Block === 'buff1ally' && getCXValue(opp) >= 8) {
        if (opp === 0) {
          G.targetMode = { type:'ownCreature', owner:0, callback:(tgt) => {
            addPermanentBuff(0, tgt.instId, 1, 1);
            log(`${blkCard.name} CX8: 味方+1/+1`, 'important');
            G.targetMode = null; render(); updateHints();
          }};
        } else {
          const ally = G.players[1].field.find(c=>c.instanceId!==blockerInstId);
          if (ally) { addPermanentBuff(1, ally.instanceId, 1, 1); log(`AI ${blkCard.name} CX8: 味方+1/+1`,'important'); }
        }
      }
      checkCreatureDeath(opp, blockerInstId, atkPlayer);
      checkCreatureDeath(atkPlayer, atkInstId, opp);
      // アレスティア onBlockComplete: ブロッカーが生存していれば相手プレイヤーに2ダメージ
      const blockerSurvived = G.players[opp].field.some(c => c.instanceId === blockerInstId);
      const defHasArestia = G.players[opp].field.some(c => CARD_DB[c.cardId].id === 'arestia');
      if (blockerSurvived && defHasArestia) {
        G.players[atkPlayer].life -= 2;
        showFloatDamage(2, atkPlayer === 0 ? 'player' : 'ai');
        log('アレスティア: ブロッカー生存 → 2ダメージ', 'damage');
      }
      // damage2attacker: set targetMode only if valid targets remain after combat
      if (_damage2needsTarget) {
        const validTargets = G.players[atkPlayer].field;
        if (validTargets.length > 0) {
          G.targetMode = { type:'opponentCreature', callback:(tgt) => {
            applyDamageToCreature(atkPlayer, tgt.instId, 2, opp);
            log(`${blkCard.name}: 相手クリーチャーに2ダメージ`, 'damage');
            G.targetMode = null; checkDeath(); render(); updateHints();
            if (atkPlayer === 1) setTimeout(() => continueAIAttack(), 400);
          }};
          log(`${blkCard.name}: 2ダメージの対象を選択（紫枠のクリーチャー）`);
        } else {
          log(`${blkCard.name}: 相手クリーチャーなし、2ダメージ無効`);
        }
      }
    }
  } else {
    // Unblocked: deal damage to opponent player
    G.players[opp].life -= atkPow;
    showFloatDamage(atkPow, opp === 0 ? 'player' : 'ai');
    log(`${atkCard.name} が${atkPow}ダメージ！`, 'damage');
  }

  // Vigilance untap
  if (atkCard.vigilance) atkInst.tapped = false;

  checkDeath();
  G.combatArrows = [];
  render();
  log('---');

  // If AI is attacking: continue AI attack queue (skip if targetMode awaits player input)
  if (atkPlayer === 1 && !G.targetMode) {
    setTimeout(() => continueAIAttack(), 400);
  }
}

function endTurnAfterMainPhase() {
  if (G.awaitingPriority) { endTurn(); return; }
  const nonTurn = 1 - G.activePlayer;
  openPriorityWindow(nonTurn, () => endTurn());
}

function endTurn() {
  // Clear temp buffs and any leftover modes
  G.tempBuffs = [];
  G.blockDrawTrigger = false;
  G.arestiaBuffActive = false;
  G.targetMode = null;
  G.kakutouTargetMode = false;
  G.pendingKakutouInstId = null;
  G.players.forEach(p => {
    p.field.forEach(c => { c.tempPower = 0; c.tempToughness = 0; });
    p.mana = {R:0,U:0,G:0,W:0,B:0,C:0};
  });
  G.attackMode = false;
  G.blockMode = false;
  G.chargingMode = false;
  G.chargeUsedThisTurn = false;

  G.activePlayer = 1 - G.activePlayer;
  G.turn++;
  G.landPlacedThisTurn = 0;
  G.phase = 'untap';

  const ap = G.activePlayer;
  const apName = NET_MODE !== 'local' ? (ap === NET_MY_IDX ? 'あなたのターン' : '相手のターン') : (ap === 0 ? 'あなたのターン' : 'AIのターン');
  showPhaseFlash(`ターン ${G.turn}`, apName);
  log(`--- ターン${G.turn} ${ap===0?'プレイヤー':'AI'}のターン ---`, 'important');

  // Untap
  untapAll(ap);

  // Clear mustAttack on ALL creatures (fresh each turn)
  G.players[0].field.forEach(c => { c.mustAttack = false; G.mustAttackCreatures.delete(c.instanceId); });
  G.players[1].field.forEach(c => { c.mustAttack = false; G.mustAttackCreatures.delete(c.instanceId); });

  // アレスティア passive: 相手がアレスティアを持つ → アクティブプレイヤーのクリーチャーはmustAttack
  // 両者アレスティアの場合も一方向のみ（アクティブ側に適用）
  const opp = 1 - ap;
  const oppHasArestia = G.players[opp].field.some(c=>CARD_DB[c.cardId].id==='arestia');
  if (oppHasArestia) {
    G.players[ap].field.forEach(c => {
      if (!c.tapped && !c.sick) { c.mustAttack = true; G.mustAttackCreatures.add(c.instanceId); }
    });
  }

  G.phase = 'draw';
  placeLands(ap, 2);
  if (!G.firstTurn) drawCard(ap);
  G.firstTurn = false;

  G.phase = 'main';
  render();

  // メインフェイズ開始前に非ターンプレイヤーへ優先権
  const nonTurn = 1 - ap;
  openPriorityWindow(nonTurn, () => {
    if (ap === 1) {
      if (NET_MODE !== 'local') {
        log('相手のターンです（オンライン）');
        netPostTurnEnd();
      } else {
        setTimeout(aiTurn, 300);
      }
    } else {
      log('あなたのメインフェイズ');
      document.getElementById('btn-mulligan').disabled = true;
      updateHints();
    }
  });
  netPostTurnEnd();
}

// ============================================================
// CHARGE SYSTEM
// ============================================================
function startCharge() {
  if (NET_MODE === 'guest') { netSendAction('charge', {}); return; }
  if (G.activePlayer !== 0) { log('あなたのターンではありません'); return; }
  if (G.phase !== 'main') { log('メインフェイズ中のみチャージできます'); return; }
  if (G.chargeUsedThisTurn) { log('チャージはターンに1回のみです'); return; }
  if (G.players[0].hand.length === 0) { log('手札がありません'); return; }

  // Check if any land can still be charged
  const validLands = G.players[0].lands.filter(l => !l.chargeCard);
  if (validLands.length === 0) { log('チャージできる土地がありません'); return; }

  G.chargingMode = true;
  log('チャージするカードを手札から選んでください');
  render(); updateHints();
}

function doCharge(handIndex) {
  const p = G.players[0];
  const cardId = p.hand[handIndex];
  // Now need to pick a land
  G.chargingMode = 'pick_land';
  G.selectedCard = {owner: 0, zone: 'hand', index: handIndex};
  log('土地を選んでください（チャージカードを置く）');
  render(); updateHints();
}

function chargeToLand(landInstId) {
  const p = G.players[0];
  const land = p.lands.find(l => l.instanceId === landInstId);
  if (!land || land.chargeCard) {
    log('その土地にはチャージできません');
    G.chargingMode = false;
    G.selectedCard = null;
    render(); updateHints();
    return;
  }
  const hi = G.selectedCard.index;
  const cardId = p.hand[hi];
  p.hand.splice(hi, 1);
  land.chargeCard = cardId;
  land.tapped = false; // チャージで土地をアンタップ（再起動可能）
  G.chargingMode = false;
  G.selectedCard = null;
  G.chargeUsedThisTurn = true;
  log(`チャージ: ${CARD_DB[cardId].name} を土地に置き、土地をアンタップ`);
  // wasure_heichi: draw 1 when charged
  const landCard = CARD_DB[land.cardId];
  if (landCard.chargeDrawTrigger) {
    drawCard(0);
    log('忘れ去られし平地: カードを1枚引く');
  }
  render(); updateHints();
}

function activateChargedLand(player, instId) {
  const p = G.players[player];
  const land = p.lands.find(l => l.instanceId === instId);
  if (!land || !land.chargeCard) return;
  const landCard = CARD_DB[land.cardId];
  if (!landCard.chargedAbility) return;
  const opp = 1-player;

  if (landCard.chargedAbility === 'look3keep1white') {
    // Cost: タップ(この土地) + W3
    if (land.tapped) { log(`${landCard.name}: タップ済みのため起動できません`); return; }
    if (!canAfford(player, {W:3})) { log('マナ不足 (白3)'); return; }
    land.tapped = true;
    payMana(player, {W:3});
    doLook3Keep1White(player);
    log(`${landCard.name}: 3ルック1(白)`);
    render(); updateHints();
  } else if (landCard.chargedAbility === 'kaizouReturn') {
    // shigen_heichi: OC + tap -> produce WW, send to land deck bottom
    if (!isOCActive(player)) { log('OC未達成'); return; }
    if (land.tapped) { log('タップ済み'); return; }
    land.tapped = true;
    p.mana.W = (p.mana.W||0)+2;
    // Send land to bottom of land deck
    const idx = p.lands.findIndex(l=>l.instanceId===instId);
    p.lands.splice(idx,1);
    p.landDeck.push(land.cardId);
    log(`${landCard.name} 還元: WW追加、土地デッキ底へ`, 'heal');
    render(); updateHints();
  } else if (landCard.chargedAbility === 'damage2opponent') {
    // kemono_heichi: 自身を土地デッキ底へ送り → 相手クリーチャーに2ダメージ
    // 土地をフィールドから除去
    const lIdx = p.lands.findIndex(l=>l.instanceId===instId);
    if (lIdx === -1) return;
    p.lands.splice(lIdx, 1);
    p.landDeck.push(landCard.id);
    if (land.chargeCard) p.exile.push(land.chargeCard);
    log(`${landCard.name} 還元: 土地デッキ底へ`);
    if (player === 0) {
      G.targetMode = { type:'opponentCreature', callback:(tgt) => {
        applyDamageToCreature(opp, tgt.instId, 2, player);
        log(`${landCard.name} 還元: 2ダメージ`, 'damage');
        G.targetMode = null; render(); updateHints();
      }};
      log('対象を選択（2ダメージ）');
    } else {
      const targets = G.players[opp].field;
      if (targets.length > 0) {
        applyDamageToCreature(opp, targets[0].instanceId, 2, player);
        log(`AI ${landCard.name} 還元: 2ダメージ`, 'damage');
      }
    }
    render(); updateHints();
  } else if (landCard.chargedAbility === 'buffWhiteCreature') {
    // serashia_miyako: tap -> give own white creature +0/+1 permanent
    if (land.tapped) { log('タップ済み'); return; }
    land.tapped = true;
    if (player === 0) {
      G.targetMode = { type:'ownCreature', owner:player, callback:(tgt) => {
        const tc = G.players[player].field.find(x=>x.instanceId===tgt.instId);
        if (tc && CARD_DB[tc.cardId].color === 'W') {
          addPermanentBuff(player, tgt.instId, 0, 1);
          log(`${landCard.name}: 白クリーチャー+0/+1(永続)`);
        } else { log('白クリーチャーを選んでください'); }
        G.targetMode = null; render(); updateHints();
      }};
      log('白クリーチャーを選択（+0/+1永続）');
    } else {
      const whites = G.players[player].field.filter(c=>CARD_DB[c.cardId].color==='W');
      if (whites.length > 0) { addPermanentBuff(player, whites[0].instanceId, 0, 1); log(`AI ${landCard.name}: 白クリーチャー+0/+1`); }
    }
    render(); updateHints();
  }
}

// ============================================================
// COMBAT
// ============================================================
function getEffectivePower(player, inst) {
  const card = CARD_DB[inst.cardId];
  const pb = getPermanentBuff(inst.instanceId);
  return card.power + (inst.tempPower||0) + pb.power + getCXBonus(player, inst).power;
}
function getEffectiveToughness(player, inst) {
  const card = CARD_DB[inst.cardId];
  const pb = getPermanentBuff(inst.instanceId);
  return card.toughness + (inst.tempToughness||0) + pb.toughness + getCXBonus(player, inst).toughness;
}

function toggleAttacker(instId) {
  const p = G.players[0];
  const creature = p.field.find(c => c.instanceId === instId);
  if (!creature) return;
  if (!canCreatureAttack(0, creature)) return;
  const card = CARD_DB[creature.cardId];
  const idx = p.attackers.indexOf(instId);
  if (idx === -1) {
    p.attackers.push(instId);
    if (!card.vigilance) creature.tapped = true;
    log(`攻撃宣言: ${card.name}`);
    // 格闘: 出たターンはクリーチャーを対象に選ぶ
    if (card.kakutou && creature.entryTurn === G.turn) {
      // 対象可能クリーチャー確認 (飛行制限込み)
      const reachable = G.players[1].field.filter(c => card.flying || !CARD_DB[c.cardId].flying);
      if (reachable.length === 0) {
        // 対象なし → 攻撃取り消し
        p.attackers.splice(p.attackers.indexOf(instId), 1);
        if (!card.vigilance) creature.tapped = false;
        log('格闘: 対象にできるクリーチャーがいません');
        render(); updateHints();
        return;
      }
      G.kakutouTargetMode = true;
      G.pendingKakutouInstId = instId;
      log('格闘: 攻撃対象のクリーチャーを選択してください');
    }
  } else {
    p.attackers.splice(idx, 1);
    if (!card.vigilance) creature.tapped = false;
    delete G.kakutouTargets[instId];
    G.kakutouTargetMode = false;
    G.pendingKakutouInstId = null;
  }
  render(); updateHints();
}

function canFlyBlock(attackerInst, blockerInst) {
  const atkCard = CARD_DB[attackerInst.cardId];
  const blkCard = CARD_DB[blockerInst.cardId];
  const atkFlying = atkCard.flying || false;
  const blkFlying = blkCard.flying || false;
  // Flying attacker can only be blocked by flying
  if (atkFlying && !blkFlying) return false;
  // Non-flying blocker can block non-flying
  return true;
}

function aiDeclareBlockers() {
  const ai = G.players[1];
  const player = G.players[0];
  player.blockers = {};
  // Eligible blockers: untapped AI creatures (or bastian OC: can block while tapped)
  const eligibleBlockers = ai.field.filter(c => {
    const card = CARD_DB[c.cardId];
    if (card.ocBlockWhileTapped && isOCActive(1)) return true;
    return !c.tapped;
  });
  let usedBlockers = new Set();
  player.attackers.forEach(atkId => {
    const attacker = player.field.find(c=>c.instanceId===atkId);
    if (!attacker) return;
    const blocker = eligibleBlockers.find(b => !usedBlockers.has(b.instanceId) && canFlyBlock(attacker, b));
    if (blocker) {
      usedBlockers.add(blocker.instanceId);
      player.blockers[atkId] = [blocker.instanceId];
      const atkCard = CARD_DB[attacker.cardId];
      const blkCard = CARD_DB[blocker.cardId];
      log(`AIブロック: ${blkCard.name} が ${atkCard.name} をブロック`);
    }
  });
}

function resolveCombat() {
  const player = G.players[0];
  const ai = G.players[1];
  G.combatBlockersAlive = {};

  // アレスティア passive: if AI has arestia and player attacks, player's creatures all got +1/+1 temp (already applied in startCombat)

  player.attackers.forEach(atkId => {
    const attacker = player.field.find(c => c.instanceId === atkId);
    if (!attacker) return;
    const atkCard = CARD_DB[attacker.cardId];
    const atkPow = getEffectivePower(0, attacker);
    const blockerIds = player.blockers[atkId] || [];

    if (blockerIds.length === 0) {
      // 格闘: 出たターンはクリーチャーのみ攻撃、対象クリーチャーに直接ダメージ
      if (atkCard.kakutou && attacker.entryTurn === G.turn) {
        const tgtId = G.kakutouTargets[atkId];
        const tgtInst = tgtId ? ai.field.find(c=>c.instanceId===tgtId) : null;
        if (tgtInst) {
          const tgtPow = getEffectivePower(1, tgtInst);
          tgtInst.damage += atkPow;
          attacker.damage += tgtPow;
          log(`${atkCard.name} (格闘) が ${CARD_DB[tgtInst.cardId].name} に${atkPow}ダメージ`, 'damage');
          checkCreatureDeath(1, tgtId, 0);
          checkCreatureDeath(0, atkId, 1);
        }
        return;
      }
      ai.life -= atkPow;
      showFloatDamage(atkPow, 'ai');
      log(`${atkCard.name} が${atkPow}ダメージを与えた`, 'damage');
    } else {
      blockerIds.forEach(blkId => {
        const blocker = ai.field.find(c => c.instanceId === blkId);
        if (!blocker) return;
        const blkCard = CARD_DB[blocker.cardId];
        const blkPow = getEffectivePower(1, blocker);

        blocker.damage += atkPow;
        attacker.damage += blkPow;

        // serashia_junhei on block: deal 2 damage to attacker
        if (blkCard.onBlock === 'damage2attacker') {
          attacker.damage += 2;
          log(`${blkCard.name} ブロック: 攻撃クリーチャーに2ダメージ`, 'damage');
        }
        // serashia_heishi on block: draw
        if (blkCard.onBlock === 'draw1') {
          drawCard(1);
          log(`AI ${blkCard.name} ブロック: 1ドロー`);
        }
        // serashia_souryo on block: gain 3 life
        if (blkCard.onBlock === 'gain3life') {
          ai.life += 3;
          log(`AI ${blkCard.name} ブロック: ライフ3回復`, 'heal');
        }
        // CX8 souryo block: buff ally
        if (blkCard.cx8Block === 'buff1ally' && getCXValue(1) >= 8) {
          // AI picks strongest ally to buff
          const allies = ai.field.filter(c=>c.instanceId!==blkId);
          if (allies.length > 0) {
            addPermanentBuff(1, allies[0].instanceId, 1, 1);
            log(`AI ${blkCard.name} CX8ブロック: 味方+1/+1`);
          }
        }
        // blockDrawTrigger (介善)
        if (G.blockDrawTrigger) {
          drawCard(0);
          log('介善: ブロック時1ドロー');
        }

        const blockerDied = checkCreatureDeath(1, blkId, 0);
        G.combatBlockersAlive[blkId] = !blockerDied;
      });
      checkCreatureDeath(0, atkId, 1);
    }
  });

  // アレスティア block-completion: if player has arestia and no blockers died -> 2 damage to AI
  const aresInst = player.field.find(c=>CARD_DB[c.cardId].id==='arestia');
  if (aresInst && player.attackers.length > 0) {
    const allBlockers = Object.values(player.blockers).flat();
    const anyDied = allBlockers.some(bid => G.combatBlockersAlive[bid] === false);
    if (allBlockers.length > 0 && !anyDied) {
      ai.life -= 2;
      showFloatDamage(2, 'ai');
      log('アレスティア: ブロッカー全生存 → 2ダメージ', 'damage');
    }
  }

  // Vigilance: untap vigilant attackers
  player.attackers.forEach(atkId => {
    const atk = player.field.find(c=>c.instanceId===atkId);
    if (atk && CARD_DB[atk.cardId].vigilance) { atk.tapped = false; }
  });

  checkDeath();
  G.players[0].attackers = [];
  G.players[0].blockers = {};
  G.combatStep = null;
  G.attackMode = false;
  G.blockDrawTrigger = false;
  G.phase = 'main';
  render();
  setTimeout(() => endTurnAfterMainPhase(), 400);
}

function getCXBonus(player, creature) {
  const card = CARD_DB[creature.cardId];
  if (!card.keywords) return {power:0, toughness:0};
  const cx = getCXValue(player);
  if (card.id === 'bastian' && card.cx8Buff && cx >= 8) return {power:3, toughness:3};
  return {power:0, toughness:0};
}

function getCXValue(player) {
  const p = G.players[player];
  let landCount = p.lands.length;
  let chargeCount = p.lands.filter(l => l.chargeCard).length;
  return landCount + chargeCount;
}

function isOCActive(player) {
  return getCXValue(player) >= 10;
}

// ============================================================
// PRIORITY WINDOW SYSTEM
// ============================================================
function openPriorityWindow(forPlayer, continuation) {
  G.awaitingPriority = true;
  G.priorityFor = forPlayer;
  G.priorityContinuation = continuation;
  render();
  updateHints();
  if (forPlayer === 1) {
    setTimeout(() => aiHandlePriority(), 700);
  }
}

function closePriorityAndResolve() {
  G.awaitingPriority = false;
  G.priorityFor = null;
  const cont = G.priorityContinuation;
  G.priorityContinuation = null;

  if (G.stack.length > 0) {
    // LIFO: 最後に積んだものを解決
    const item = G.stack.pop();
    log(`スタック解決: ${item.icon||''} ${item.name}`, 'important');
    if (item.resolve) item.resolve();
    renderStack();
    render();
    // まだスタックが残っていれば再度優先権ウィンドウ
    if (G.stack.length > 0) {
      setTimeout(() => openPriorityWindow(1 - G.activePlayer, cont), 400);
      return;
    }
  }
  // スタック空 → continuation実行
  if (cont) setTimeout(cont, 50);
}

function aiHandlePriority() {
  if (!G.awaitingPriority || G.priorityFor !== 1) return;
  const ai = G.players[1];
  // Find a Quick spell AI can play
  const response = ai.hand.map((cid, i) => ({ cid, i, card: CARD_DB[cid] }))
    .find(({ card }) => card.keywords && card.keywords.includes('Quick') && canAfford(1, card.cost));
  if (response) {
    const { cid, i, card } = response;
    log(`AI: ${card.name} を対応で使用 (Quick)`, 'important');
    showAIBalloon(`⚡ ${card.icon} ${card.name} 対応！`);
    payMana(1, card.cost);
    ai.hand.splice(i, 1);
    // スタックゾーンに置く（解決時に墓地へ）
    G.stack.push({ name: card.name, icon: card.icon || '✨', owner: 1, resolve: () => {
      ai.graveyard.push(cid);
      aiPlaySpellEffect(card);
    }});
    renderStack();
  }
  closePriorityAndResolve();
}

function passPriority() {
  if (NET_MODE === 'guest') { netSendAction('passPriority', {}); return; }
  if (G.awaitingPriority) {
    closePriorityAndResolve();
    return;
  }
  if (G.stack.length > 0) {
    resolveStack();
  }
}

function resolveStack() {
  if (G.stack.length === 0) return;
  const item = G.stack.pop();
  log(`スタックを解決: ${item.name}`);
  if (item.resolve) item.resolve();
  render();
}

// ============================================================
// MULLIGAN
// ============================================================
function doMulligan() {
  const p = G.players[0];
  if (p.mulliganUsed) { log('マリガンは1回のみ使用できます'); return; }
  p.mulliganUsed = true;
  document.getElementById('btn-mulligan').disabled = true;

  // Show mulligan modal - choose cards to return
  const cards = p.hand.map((cid, i) => ({cid, i}));
  let chosen = new Set();

  const html = `
    <p style="margin-bottom:10px; font-size:11px;">戻すカードを選択（選択したカードをデッキの底に戻し、同じ枚数ドロー）</p>
    <div style="display:flex; flex-wrap:wrap; gap:6px;" id="mulligan-cards"></div>
    <button onclick="confirmMulligan()" style="margin-top:10px; width:100%;">確認</button>
  `;
  showModal('マリガン', html);

  const container = document.getElementById('mulligan-cards');
  cards.forEach(({cid, i}) => {
    const card = CARD_DB[cid];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;';
    const el = document.createElement('div');
    el.className = `card color-${card.color}`;
    el.style.cursor = 'pointer';
    el.innerHTML = buildCardHTML(card);
    const info = document.createElement('div');
    info.style.cssText = 'width:84px;font-size:9px;color:#ccc;line-height:1.4;text-align:left;background:#1a1a2a;border:1px solid #333;border-radius:4px;padding:4px;white-space:pre-wrap;';
    info.textContent = (card.text || '（テキストなし）');
    wrap.appendChild(el);
    wrap.appendChild(info);
    wrap.onclick = () => {
      if (chosen.has(i)) { chosen.delete(i); wrap.style.opacity = '1'; }
      else { chosen.add(i); wrap.style.opacity = '0.4'; }
      window._mulliganChosen = chosen;
    };
    container.appendChild(wrap);
  });
  window._mulliganHand = p.hand;
  window._mulliganChosen = chosen;
}

function confirmMulligan() {
  const p = G.players[0];
  const chosen = window._mulliganChosen || new Set();
  const count = chosen.size;
  if (count === 0) { closeModal(); return; }
  // Return chosen cards to deck bottom
  const newHand = [];
  p.hand.forEach((cid, i) => {
    if (chosen.has(i)) { p.deck.push(cid); }
    else { newHand.push(cid); }
  });
  p.hand = newHand;
  // Shuffle deck
  p.deck = shuffle(p.deck);
  // Draw same count
  for (let i = 0; i < count; i++) drawCard(0);
  closeModal();
  log(`マリガン: ${count}枚入れ替え`);
  render();
}

// ============================================================
// AI LOGIC
// ============================================================
function aiTurn() {
  if (G.phase === 'ended') return;
  const ai = G.players[1];
  log('AIのターン...', 'important');

  // Tap lands for mana
  ai.lands.forEach(land => {
    if (!land.tapped) tapLandForMana(1, land.instanceId);
  });

  // Play creatures/spells
  let played = true;
  let attempts = 0;
  let aiPlayedCard = false;
  while (played && attempts < 20) {
    played = false; attempts++;
    const playable = ai.hand.map((cid, i) => ({cid, i, card: CARD_DB[cid]}))
      .filter(({card}) => card.type !== 'land' && canAfford(1, card.cost));

    // 評価スコアで最善カードを選択（学習済み重みを使用）
    const best = playable.length > 0 ? aiPickBestCard(playable) : null;
    if (playable.length > 0) {
      const {cid, i, card} = best;
      if (card.type === 'creature' && ai.field.length < 5) {
        payMana(1, card.cost);
        ai.hand.splice(i, 1);
        const inst = newInstance(cid);
        inst.sick = true;
        inst.entryTurn = G.turn;
        log(`AI: ${card.name} をスタックに積んだ`);
        showAIBalloon(`${card.icon} ${card.name} 召喚！`);
        G.stack.push({ name: card.name, icon: card.icon||'⚔️', owner: 1, resolve: () => {
          if (ai.field.length >= 5) { ai.graveyard.push(cid); return; }
          ai.field.push(inst);
          log(`AI: ${card.name} が場に出た`, 'important');
          fireETB(1, inst.instanceId);
          render();
        }});
        renderStack();
        played = true;
        aiPlayedCard = true;
        render();
      } else if (card.type === 'spell') {
        payMana(1, card.cost);
        ai.hand.splice(i, 1);
        // スタックゾーンに置く（解決時に墓地へ）
        showAIBalloon(`${card.icon} ${card.name} 使用！`);
        log(`AI: ${card.name} をスタックに積んだ`);
        G.stack.push({ name: card.name, icon: card.icon||'✨', owner: 1, resolve: () => {
          ai.graveyard.push(cid); // 解決時に墓地へ
          aiPlaySpellEffect(card);
        }});
        renderStack();
        played = true;
        aiPlayedCard = true;
        render();
      }
    }
  }

  if (aiPlayedCard) {
    openPriorityWindow(0, () => setTimeout(() => aiAttack(), 300));
  } else {
    setTimeout(() => { aiAttack(); }, 600);
  }
}

function totalCost(cost) {
  return Object.values(cost).reduce((a,b)=>a+b,0);
}

// Apply only the effect of an AI spell (mana/hand already handled separately)
function aiPlaySpellEffect(card) {
  const ai = G.players[1];
  const player = G.players[0];

  if (card.effect === 'junigeki') {
    const targets = player.field;
    if (targets.length > 0) {
      const tgt = targets.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI: ${card.name} でプレイヤークリーチャーに2ダメージ`, 'damage');
      if (ai.field.length > 0) {
        const ally = ai.field[0];
        ally.tempToughness = (ally.tempToughness||0)+1;
        G.tempBuffs.push({instanceId:ally.instanceId,power:0,toughness:1});
      }
    }
  } else if (card.effect === 'kaizen') {
    if (player.field.length > 0) {
      const tgt = player.field.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI 介善(A): プレイヤークリーチャーに2ダメージ`, 'damage');
    }
    G.blockDrawTrigger = true;
  } else {
    log(`AI: ${card.name} を使用`);
  }
  checkDeath();
}

function aiPlaySpell(card, handIndex) {
  const ai = G.players[1];
  const player = G.players[0];
  payMana(1, card.cost);
  ai.hand.splice(handIndex, 1);
  ai.graveyard.push(card.id);

  if (card.effect === 'junigeki') {
    // Target player's strongest creature for 2 damage
    const targets = player.field;
    if (targets.length > 0) {
      const tgt = targets.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI: ${card.name} でプレイヤークリーチャーに2ダメージ`, 'damage');
      // Buff own creature +0/+1
      if (ai.field.length > 0) {
        const ally = ai.field[0];
        ally.tempToughness = (ally.tempToughness||0)+1;
        G.tempBuffs.push({instanceId:ally.instanceId,power:0,toughness:1});
      }
    }
  } else if (card.effect === 'kaizen') {
    // AI version: choice A (damage) if opponent has creatures, else B (mustAttack)
    if (player.field.length > 0) {
      const tgt = player.field.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
      applyDamageToCreature(0, tgt.instanceId, 2, 1);
      log(`AI 介善(A): プレイヤークリーチャーに2ダメージ`, 'damage');
    }
    G.blockDrawTrigger = true; // applies to whoever blocks this turn (AI turn, so player blocking AI attacks)
  } else {
    log(`AI: ${card.name} を使用`);
  }
  checkDeath();
}

function aiAttack() {
  if (G.phase === 'ended') return;
  // Build attacker queue
  const ai = G.players[1];
  const player = G.players[0];
  const attackerInsts = [];
  ai.field.forEach(c => {
    const card = CARD_DB[c.cardId];
    if (G.cantAttackPermanent.has(c.instanceId)) return;
    if (c.tapped && !card.vigilance) return;
    if (c.sick) {
      if (card.kakutou && c.entryTurn === G.turn && player.field.length > 0) attackerInsts.push(c);
      return;
    }
    attackerInsts.push(c);
  });

  if (attackerInsts.length === 0) { setTimeout(() => endTurnAfterMainPhase(), 300); return; }

  showAIBalloon('⚔️ 攻撃宣言！');
  G._aiAttackQueue = attackerInsts.map(c => c.instanceId);
  setTimeout(() => continueAIAttack(), 400);
}

function continueAIAttack() {
  if (G.phase === 'ended') return;
  if (!G._aiAttackQueue || G._aiAttackQueue.length === 0) {
    setTimeout(() => endTurnAfterMainPhase(), 300);
    return;
  }
  const atkInstId = G._aiAttackQueue.shift();
  const ai = G.players[1];
  const player = G.players[0];
  const atkInst = ai.field.find(c => c.instanceId === atkInstId);
  if (!atkInst) { setTimeout(() => continueAIAttack(), 100); return; }
  const card = CARD_DB[atkInst.cardId];
  if (!card.vigilance) atkInst.tapped = true;

  // アレスティア passive: AI攻撃時、プレイヤーがアレスティアを持っていれば全クリーチャー+1/+1
  const playerHasArestia = G.players[0].field.some(c => CARD_DB[c.cardId].id === 'arestia');
  if (playerHasArestia && !G.arestiaBuffActive) {
    G.players[0].field.forEach(c => addTempBuff(0, c.instanceId, 1, 1));
    G.arestiaBuffActive = true;
    log('アレスティア: 全クリーチャー+1/+1（ターン終了時まで）');
  }

  // 格闘
  if (card.kakutou && atkInst.entryTurn === G.turn) {
    const reachable = player.field.filter(pc => card.flying || !CARD_DB[pc.cardId].flying);
    if (reachable.length === 0) {
      log(`AI ${card.name} 格闘: 対象なし`);
      G.combatArrows = [];
      render();
      setTimeout(() => continueAIAttack(), 400);
      return;
    }
    const tgt = reachable.reduce((a,b)=>getEffectivePower(0,b)>getEffectivePower(0,a)?b:a);
    const tgtId = tgt.instanceId;
    log(`AI ${card.name} 格闘 → ${CARD_DB[tgt.cardId].name}`);
    G.combatArrows = [{fromId: atkInstId, toId: tgtId, color: '#ff4444'}];
    render();
    openPriorityWindow(0, () => {
      const aAlive = G.players[1].field.find(c => c.instanceId === atkInstId);
      const tAlive = G.players[0].field.find(c => c.instanceId === tgtId);
      if (!aAlive || !tAlive) {
        log('格闘: クリーチャーが破壊されたため攻撃中止');
        G.combatArrows = []; render();
        setTimeout(() => continueAIAttack(), 300);
        return;
      }
      resolveSingleCombat(1, atkInstId, tgtId, null);
    });
    return;
  }

  // Normal: open priority window for player before blocker phase
  log(`AI ${card.name} が攻撃宣言`);
  G.combatArrows = [{fromId: atkInstId, toId: null, color: '#ff8800'}];
  render();
  openPriorityWindow(0, () => {
    const stillAlive = G.players[1].field.find(c => c.instanceId === atkInstId);
    if (!stillAlive) {
      log('攻撃クリーチャーが破壊されたため攻撃中止');
      G.combatArrows = []; render();
      setTimeout(() => continueAIAttack(), 300);
      return;
    }
    const eligibleBlockers = player.field.filter(c => {
      const bc = CARD_DB[c.cardId];
      return (!c.tapped || (bc.ocBlockWhileTapped && isOCActive(0))) && canFlyBlock(atkInst, c);
    });
    if (eligibleBlockers.length === 0) {
      resolveSingleCombat(1, atkInstId, null, null);
      return;
    }
    // Player block phase for this single attacker
    G.aiCurrentAttackers = [{instId: atkInstId, targetType:'player', targetInstId:null}];
    G.playerBlockMode = true;
    G.playerBlockAssignments = {};
    G.selectedBlockerToAssign = null;
    log(`--- ${card.name} に対してブロッカーを宣言（任意）→「ブロック確定」 ---`, 'important');
    render(); updateHints();
  });
}

function resolveAICombat() {
  if (G.phase === 'ended') return;
  // Single-attacker block confirmed: get the one queued attacker
  const {instId: atkId} = G.aiCurrentAttackers[0] || {};
  const blkId = atkId ? G.playerBlockAssignments[atkId] : null;

  G.playerBlockMode = false;
  G.aiCurrentAttackers = [];
  G.playerBlockAssignments = {};
  G.selectedBlockerToAssign = null;
  G.combatArrows = [];

  resolveSingleCombat(1, atkId, null, blkId || null);
}

function safeCall(fn, label) {
  try { fn(); } catch(e) { console.error('[render] ' + label + ':', e); }
}
function render() {
  if (G.phase === 'ended' && !G._endedRendered) {
    G._endedRendered = true;
  }
  // For guest: swap player indices so guest sees themselves on the bottom
  const me = NET_MY_IDX, opp = 1 - NET_MY_IDX;
  safeCall(() => renderHand(me, 'player-hand'), 'renderHand(me)');
  safeCall(() => renderHand(opp, 'ai-hand'), 'renderHand(opp)');
  safeCall(() => renderField(me, 'player-field'), 'renderField(me)');
  safeCall(() => renderField(opp, 'ai-field'), 'renderField(opp)');
  safeCall(() => renderLands(me, 'player-lands'), 'renderLands(me)');
  safeCall(() => renderLands(opp, 'ai-lands'), 'renderLands(opp)');
  safeCall(() => renderInfoBar(), 'renderInfoBar');
  safeCall(() => renderStack(), 'renderStack');
  safeCall(() => updateCounts(), 'updateCounts');
  safeCall(() => updateThresholdGauge(), 'updateThresholdGauge');
  safeCall(() => updateManaDisplay(), 'updateManaDisplay');
  safeCall(() => drawCombatArrows(), 'drawCombatArrows');
  const pgc = document.getElementById('player-grave-count');
  const agc = document.getElementById('ai-grave-count');
  if (pgc) pgc.textContent = G.players[NET_MY_IDX].graveyard.length;
  if (agc) agc.textContent = G.players[1-NET_MY_IDX].graveyard.length;
  netPostAction();
  _resetFreezeTimer();
  const fw = document.getElementById('debug-freeze-warn');
  if (fw) fw.style.display = 'none';
}

function buildCardHTML(card, inst, playerOwner) {
  let ptHtml = '';
  if (card.type === 'creature' && inst) {
    const pb = getPermanentBuff(inst.instanceId);
    const p2 = playerOwner !== undefined ? playerOwner : 0;
    const cxb = getCXBonus(p2, inst);
    const pw = card.power + (inst.tempPower||0) + pb.power + cxb.power;
    const th = card.toughness + (inst.tempToughness||0) + pb.toughness + cxb.toughness;
    const dmgStr = inst.damage > 0 ? `-${inst.damage}` : '';
    ptHtml = `<div class="card-pt">${pw}/${th}${dmgStr}</div>`;
  } else if (card.type === 'creature') {
    ptHtml = `<div class="card-pt">${card.power}/${card.toughness}</div>`;
  }
  const costStr = card.cost ? `<div class="card-cost">${costToString(card.cost)}</div>` : '';
  const keywords = card.keywords && card.keywords.length ? `<div class="card-keywords">${card.keywords.map(k=>{ const def=KEYWORD_DEFS&&KEYWORD_DEFS[k]?KEYWORD_DEFS[k]:k; return `<span class="kw-tip" data-def="${def}">${k}</span>`; }).join(' ')}</div>` : '';
  const dmg = inst && inst.damage > 0 ? `<div class="damage-counter">${inst.damage}</div>` : '';
  const chg = inst && inst.chargeCard ? `<div class="charge-indicator">CG</div>` : '';
  return `
    <div class="card-art">${card.icon}</div>
    <div class="card-bottom">
      <div class="card-name">${card.name}</div>
      <div class="card-type-line">${card.type === 'creature' ? card.subtype : card.type}</div>
      ${keywords}
      ${ptHtml}
    </div>
    ${costStr}${dmg}${chg}
  `;
}

function renderHand(player, zoneId) {
  const zone = document.getElementById(zoneId || (player === 0 ? 'player-hand' : 'ai-hand'));
  zone.innerHTML = '';
  const p = G.players[player];

  p.hand.forEach((cardId, i) => {
    const card = CARD_DB[cardId];
    const el = document.createElement('div');
    if (player !== NET_MY_IDX) {
      el.className = 'card face-down';
    } else if (G.mulliganMode) {
      el.className = `card color-${card.color}`;
      el.innerHTML = buildCardHTML(card);
      el.style.cursor = 'pointer';
      el.dataset.cardId = card.id;
      if (G.mulliganSelected.has(i)) {
        el.style.opacity = '0.35';
        el.style.outline = '2px solid #ff6666';
      } else {
        el.style.outline = '2px solid transparent';
      }
      el.onclick = () => {
        if (G.mulliganSelected.has(i)) G.mulliganSelected.delete(i);
        else G.mulliganSelected.add(i);
        const countEl = document.getElementById('mulligan-count');
        if (countEl) countEl.textContent = G.mulliganSelected.size;
        renderHand(0);
      };
    } else {
      el.className = `card color-${card.color}`;
      // Determine if playable
      const isMain = G.phase === 'main' && G.activePlayer === player;
      const isQuick = card.keywords && card.keywords.includes('Quick');
      const affordable = card.type !== 'land' && canAfford(player, card.cost);
      const inPriorityWindow = G.awaitingPriority;
      const canPlay = affordable && (
        isMain ||
        isQuick ||
        (inPriorityWindow && G.activePlayer === player)
      );
      if (canPlay) el.classList.add('playable');
      el.innerHTML = buildCardHTML(card);
      el.onclick = () => handleHandClick(player, i);
      el.title = card.text || card.name;
      el.dataset.cardId = card.id;
    }
    zone.appendChild(el);
  });
}

function renderField(player, zoneId) {
  const zone = document.getElementById(zoneId || (player === 0 ? 'player-field' : 'ai-field'));
  zone.innerHTML = '';
  const p = G.players[player];

  for (let slot = 0; slot < 5; slot++) {
    const slotEl = document.createElement('div');
    slotEl.className = 'field-slot';
    if (slot < p.field.length) {
      const inst = p.field[slot];
      const card = CARD_DB[inst.cardId];
      const el = document.createElement('div');
      el.className = `card color-${card.color}`;
      if (inst.tapped) el.classList.add('tapped');
      // 攻撃可能ハイライト (メインフェイズ)
      if (player === 0 && G.activePlayer === 0 && G.phase === 'main' && !G.kakutouTargetMode && !G.targetMode) {
        if (canCreatureAttack(0, inst)) el.classList.add('attackable');
        // 格闘ハイライト（出たターンのみ、アンタップ、相手クリーチャーあり）
        if (card.kakutou && inst.entryTurn === G.turn && !inst.tapped
            && G.players[1].field.some(c => !CARD_DB[c.cardId].flying || card.flying)) {
          el.classList.add('attackable');
        }
      }
      // 格闘ターゲット選択 (AI側クリーチャーをハイライト、飛行制限あり)
      if (G.kakutouTargetMode && player === 1) {
        const atkInst = G.players[0].field.find(c=>c.instanceId===G.pendingKakutouInstId);
        const atkCard = atkInst ? CARD_DB[atkInst.cardId] : null;
        const canTarget = atkCard && (atkCard.flying || !CARD_DB[inst.cardId].flying);
        if (canTarget) el.classList.add('targetable');
      }
      // ブロック宣言ハイライト
      if (G.playerBlockMode) {
        if (player === 0) {
          const card2 = CARD_DB[inst.cardId];
          const canBlk = (!inst.tapped || (card2.ocBlockWhileTapped && isOCActive(0)))
            && !G.directlyAttackedCreatures.has(inst.instanceId);
          if (canBlk) el.classList.add('blockable');
          if (G.selectedBlockerToAssign === inst.instanceId) el.classList.add('selected');
          const isAssigned = Object.values(G.playerBlockAssignments).includes(inst.instanceId);
          if (isAssigned) el.classList.add('selected');
        }
        if (player === 1) {
          const isAtkr = G.aiCurrentAttackers.some(a=>a.instId===inst.instanceId);
          if (isAtkr) el.classList.add('attackable');
          if (G.playerBlockAssignments[inst.instanceId]) {
            const blkInst = G.players[0].field.find(c=>c.instanceId===G.playerBlockAssignments[inst.instanceId]);
            if (blkInst) el.title = `ブロック: ${CARD_DB[blkInst.cardId].name}`;
            el.classList.add('selected');
          }
        }
      }
      // Target mode
      if (G.targetMode) {
        const tm = G.targetMode.type;
        if (tm === 'creature' || tm === 'any') el.classList.add('targetable');
        if (tm === 'opponentCreature' && player !== (G.targetMode.sourcePlayer||0)) el.classList.add('targetable');
        if (tm === 'ownCreature' && player === (G.targetMode.owner||0)) el.classList.add('targetable');
      }
      el.innerHTML = buildCardHTML(card, inst, player);
      el.setAttribute('data-inst', inst.instanceId);
      el.dataset.cardId = inst.cardId;
      el.onclick = () => handleFieldClick(player, inst.instanceId);
      slotEl.appendChild(el);
    } else {
      slotEl.textContent = '';
    }
    zone.appendChild(slotEl);
  }
}

function renderLands(player, zoneId) {
  const zone = document.getElementById(zoneId || (player === 0 ? 'player-lands' : 'ai-lands'));
  zone.innerHTML = '';
  const p = G.players[player];

  const sortedLands = [...p.lands].sort((a, b) => {
    // 1. タップ済みは右
    if (a.tapped !== b.tapped) return a.tapped ? 1 : -1;
    // 2. あいうえお順（同名同士が隣接）
    const nameCmp = CARD_DB[a.cardId].name.localeCompare(CARD_DB[b.cardId].name, 'ja');
    if (nameCmp !== 0) return nameCmp;
    // 3. 同名内: チャージ済みは右
    return (a.chargeCard ? 1 : 0) - (b.chargeCard ? 1 : 0);
  });

  sortedLands.forEach(land => {
    const card = CARD_DB[land.cardId];
    const el = document.createElement('div');
    el.className = `land-card color-${card.color}`;
    if (land.tapped) el.classList.add('tapped');
    if (G.chargingMode === 'pick_land' && player === 0 && !land.chargeCard) el.classList.add('selected');
    if (G.targetMode && G.targetMode.type === 'ownLand' && player === 0 && !land.tapped) el.classList.add('targetable');
    el.innerHTML = `${card.icon}<div class="land-name">${card.name}</div>`;
    if (land.chargeCard) {
      const pip = document.createElement('div');
      pip.className = 'charge-pip';
      pip.textContent = '★';
      pip.title = `チャージ: ${CARD_DB[land.chargeCard].name}`;
      el.appendChild(pip);
    }
    el.dataset.cardId = land.cardId;
    el.onclick = () => handleLandClick(player, land.instanceId);
    zone.appendChild(el);
  });
}

function handleHandClick(player, index) {
  if (NET_MODE === 'guest' && player === NET_MY_IDX) { netSendAction('playCard', {handIdx: index}); return; }
  if (player !== 0) return; // Can't click AI hand
  if (G.activePlayer !== 0 && G.phase !== 'ended') {
    // Allow quick spells
    const cardId = G.players[0].hand[index];
    const card = CARD_DB[cardId];
    if (!(card.keywords && card.keywords.includes('Quick'))) {
      log('AIのターン中は使用できません（Quickのみ可能）');
      return;
    }
  }

  if (G.chargingMode === true) {
    doCharge(index);
    return;
  }

  playCardFromHand(player, index);
}

function handleFieldClick(player, instId) {
  if (NET_MODE === 'guest') {
    if (!netCanAct()) { log('相手のターンです'); return; }
    const cardId = (G.players[player].field.find(c=>c.instanceId===instId)||{}).cardId;
    if (G.targetMode) { netSendAction('targetSelect', {instId, cardId}); return; }
    if (player === NET_MY_IDX || G.playerBlockMode) { netSendAction('activateCreature', {instId, cardId}); return; }
    return;
  }
  // 格闘ターゲット選択を最優先
  if (G.kakutouTargetMode && player === 1) {
    const atkInst = G.players[0].field.find(c=>c.instanceId===G.pendingKakutouInstId);
    const atkCard = atkInst ? CARD_DB[atkInst.cardId] : null;
    const tgtInst = G.players[1].field.find(c=>c.instanceId===instId);
    const tgtCard = tgtInst ? CARD_DB[tgtInst.cardId] : null;
    // 飛行チェック: 非飛行は飛行クリーチャーを格闘対象にできない
    if (tgtCard && tgtCard.flying && !(atkCard && atkCard.flying)) {
      log('飛行クリーチャーは飛行を持たないクリーチャーに攻撃されません');
      return;
    }
    const atkInstId = G.pendingKakutouInstId;
    const kakutouTgtId = instId;
    G.kakutouTargets[atkInstId] = kakutouTgtId;
    G.combatArrows = [{fromId: atkInstId, toId: kakutouTgtId, color: '#ff4444'}];
    log(`格闘: ${atkCard?.name} → ${tgtCard?.name}`);
    G.kakutouTargetMode = false;
    G.pendingKakutouInstId = null;
    render();
    // Priority window after 格闘 target declared
    openPriorityWindow(1, () => {
      const atkStillAlive = G.players[0].field.find(c => c.instanceId === atkInstId);
      const tgtStillAlive = G.players[1].field.find(c => c.instanceId === kakutouTgtId);
      if (!atkStillAlive || !tgtStillAlive) {
        log('格闘: クリーチャーが破壊されたため攻撃中止');
        G.combatArrows = [];
        render(); updateHints();
        return;
      }
      setTimeout(() => resolveSingleCombat(0, atkInstId, kakutouTgtId, null), 300);
    });
    return;
  }

  // Target mode (spell/ability targeting)
  if (G.targetMode) {
    const tm = G.targetMode.type;
    if (tm === 'creature' || tm === 'any') {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
    if (tm === 'opponentCreature' && player !== 0) {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
    if (tm === 'ownCreature' && player === (G.targetMode.owner||0)) {
      G.targetMode.callback({type:'creature', player, instId});
      return;
    }
  }

  // ブロック宣言: 自分クリーチャー選択 or AI攻撃クリーチャー選択
  if (G.playerBlockMode) {
    if (player === 0) {
      const inst2 = G.players[0].field.find(c=>c.instanceId===instId);
      if (!inst2) return;
      const card2 = CARD_DB[inst2.cardId];
      const canBlk = (!inst2.tapped || (card2.ocBlockWhileTapped && isOCActive(0)))
        && !G.directlyAttackedCreatures.has(instId);
      if (!canBlk) { log(`${card2.name} はブロックできません`); return; }
      // トグル選択
      if (G.selectedBlockerToAssign === instId) {
        G.selectedBlockerToAssign = null;
      } else {
        G.selectedBlockerToAssign = instId;
        log(`${card2.name} をブロッカーに選択 → AIの攻撃クリーチャーをクリック`);
      }
      render(); updateHints();
      return;
    }
    if (player === 1 && G.selectedBlockerToAssign) {
      const isAtkr = G.aiCurrentAttackers.some(a=>a.instId===instId);
      if (!isAtkr) return;
      const atkrInst = G.players[1].field.find(c=>c.instanceId===instId);
      const blkrInst = G.players[0].field.find(c=>c.instanceId===G.selectedBlockerToAssign);
      if (!atkrInst || !blkrInst) return;
      // 飛行チェック
      if (!canFlyBlock(atkrInst, blkrInst)) {
        log('飛行の制約でブロックできません'); return;
      }
      // 既に同じブロッカーが別の相手に割り当て済みなら解除
      for (const [k,v] of Object.entries(G.playerBlockAssignments)) {
        if (v === G.selectedBlockerToAssign) delete G.playerBlockAssignments[k];
      }
      G.playerBlockAssignments[instId] = G.selectedBlockerToAssign;
      log(`${CARD_DB[blkrInst.cardId].name} が ${CARD_DB[atkrInst.cardId].name} をブロック`);
      G.selectedBlockerToAssign = null;
      render(); updateHints();
      return;
    }
    // AI攻撃クリーチャーをクリックしてブロック割り当てを解除
    if (player === 1 && G.playerBlockAssignments[instId]) {
      delete G.playerBlockAssignments[instId];
      log('ブロック割り当てを解除');
      render(); updateHints();
      return;
    }
    return;
  }

  // メインフェイズに1体ずつ攻撃
  if (player === 0 && G.activePlayer === 0 && G.phase === 'main') {
    const p = G.players[0];
    const inst = p.field.find(c => c.instanceId === instId);
    if (!inst) return;
    const card = CARD_DB[inst.cardId];

    // アレスティア: 攻撃 or 還元 を選択
    if (card.id === 'arestia') {
      const canAtk = canCreatureAttack(0, inst);
      const untappedLands = G.players[0].lands.filter(l => !l.tapped);
      const hasTapped = G.players[0].field.some(c => c.instanceId !== instId && c.tapped);
      const canKaizou = untappedLands.length > 0 && hasTapped;
      const html = `
        <p style="margin-bottom:10px;">${card.name} の使用方法を選択:</p>
        <button onclick="closeModal(); startSingleAttack(0,${instId});" style="width:100%;margin-bottom:8px;padding:8px;${canAtk?'':'opacity:0.4;cursor:not-allowed;'}" ${canAtk?'':'disabled'}>⚔️ 攻撃する</button>
        <button onclick="closeModal(); arestiaKaizouStart(${instId});" style="width:100%;padding:8px;${canKaizou?'':'opacity:0.4;cursor:not-allowed;'}" ${canKaizou?'':'disabled'}>♻️ 還元: 味方クリーチャーをアンタップ</button>
      `;
      showModal(card.name, html);
      return;
    }

    // 格闘キーワード: 出たターンのみ起動可（タップして相手クリーチャーと戦闘）
    if (card.kakutou && inst.entryTurn === G.turn && !inst.tapped) {
      const opp = 1;
      const reachable = G.players[opp].field.filter(c => !CARD_DB[c.cardId].flying || card.flying);
      if (reachable.length === 0) { log(`${card.name} 格闘: 対象クリーチャーがいません`); return; }
      startKakutou(0, instId);
      return;
    }

    // 攻撃可能なら攻撃開始
    if (canCreatureAttack(0, inst)) {
      startSingleAttack(0, instId);
    }
    return;
  }
}

function handleLandClick(player, instId) {
  if (NET_MODE === 'guest') {
    if (!netCanAct()) { log('相手のターンです'); return; }
    if (G.targetMode && G.targetMode.type === 'ownLand') { netSendAction('targetSelect', {instId}); return; }
    if (player === NET_MY_IDX) { netSendAction('tapLand', {instId}); return; }
    return;
  }
  if (G.chargingMode === 'pick_land' && player === 0) {
    chargeToLand(instId);
    return;
  }
  if (G.targetMode && G.targetMode.type === 'ownLand' && player === 0) {
    const land = G.players[0].lands.find(l=>l.instanceId===instId);
    if (land && !land.tapped) { G.targetMode.callback(instId); }
    return;
  }
  if (G.targetMode) return;
  if (player !== 0) return;

  const p = G.players[0];
  const land = p.lands.find(l=>l.instanceId===instId);
  if (!land) return;

  const landCard = CARD_DB[land.cardId];

  // 起動効果はすべてクイック: フェイズ・ターン問わずタップ可能
  if (land.chargeCard && landCard.chargedAbility) {
    if (!land.tapped) {
      // Show choice: mana or special ability
      // look3keep1white costs tap+W3, so show ability as available
      const canActivate = landCard.chargedAbility !== 'look3keep1white' || canAfford(0, {W:3});
      const abilityLabel = landCard.text.split('\n').find(l => l.includes('起動') && l.includes('チャージ')) || landCard.text.split('\n')[1] || '特殊能力';
      const html = `
        <p style="margin-bottom:10px;">${landCard.name} の使用方法を選択:</p>
        <button onclick="closeModal(); tapLandForMana(0,${instId}); render();" style="width:100%;margin-bottom:8px;padding:8px;">マナを追加 (${landCard.produces||'C'})</button>
        <button onclick="closeModal(); activateChargedLand(0,${instId});" style="width:100%;padding:8px;${canActivate?'':'opacity:0.4;cursor:not-allowed;'}">${abilityLabel}</button>
      `;
      showModal(landCard.name, html);
      return;
    }
  }

  // Tap for mana (Quick: any time)
  tapLandForMana(0, instId);
}

function clearTargetMode() {
  if (G.targetMode) {

  }
  G.chargingMode = false;
  G.selectedCard = null;

function arestiaKaizouStart(instId) {
  const p = G.players[0];
  const untappedLands = p.lands.filter(l => !l.tapped);
  if (untappedLands.length === 0) { log('アレスティア 還元: アンタップ状態の土地がありません'); return; }
  const hasTapped = p.field.some(c => c.instanceId !== instId && c.tapped);
  if (!hasTapped) { log('アレスティア 還元: アンタップできるクリーチャーがいません'); return; }
  G.targetMode = { type:'ownLand', owner:0, callback:(landInstId) => {
    const lIdx = p.lands.findIndex(l => l.instanceId === landInstId);
    if (lIdx === -1 || p.lands[lIdx].tapped) { log('アンタップ状態の土地を選んでください'); return; }
    const returnedLand = p.lands.splice(lIdx, 1)[0];
    p.landDeck.push(returnedLand.cardId);
    log(`還元コスト: ${CARD_DB[returnedLand.cardId].name} を土地デッキ底へ`);
    G.targetMode = null;
    G.targetMode = { type:'ownCreature', owner:0, callback:(tgt) => {
      const tc = p.field.find(x => x.instanceId === tgt.instId);
      if (tc && tc.instanceId !== instId) {
        tc.tapped = false;
        log('アレスティア 還元: クリーチャーをアンタップ');
      }
      G.targetMode = null; render(); updateHints();
    }};
    log('アレスティア 還元: アンタップするクリーチャーを選択');
    render(); updateHints();
  }};
  log('アレスティア 還元: 土地デッキ底に置くアンタップ土地を選択');
  render(); updateHints();
}

function updateHints() {
  const hint = document.getElementById('action-hint');
  // ボタンテキスト切替
  document.getElementById('btn-end-phase').textContent =
    G.playerBlockMode ? 'ブロック確定' : 'フェイズ終了';

  const isOnline = NET_MODE !== 'local';
  const myTurn = G.activePlayer === NET_MY_IDX;
  const oppName = isOnline ? '相手' : 'AI';

  if (G.playerBlockMode) {
    if (G.selectedBlockerToAssign) {
      hint.innerHTML = '🛡️ <b>ブロック割当中</b> — 相手の攻撃クリーチャーをクリックして割り当て';
      hint.style.color = '#ff88aa';
    } else {
      hint.innerHTML = '🛡️ <b>ブロック宣言</b> — 自分クリーチャー → 攻撃クリーチャーの順にクリック（「ブロック確定」でスキップ）';
      hint.style.color = '#ff88aa';
    }
  } else if (G.kakutouTargetMode) {
    hint.innerHTML = '⚔️ <b>格闘</b> — 対象の相手クリーチャーをクリックしてください';
    hint.style.color = '#ffaa00';
  } else if (G.targetMode) {
    const tmType = G.targetMode.type;
    if (tmType === 'opponentCreature') {
      hint.innerHTML = '🎯 <b>対象選択</b> — 相手クリーチャーをクリックしてください（紫枠）';
    } else if (tmType === 'ownCreature') {
      hint.innerHTML = '🎯 <b>対象選択</b> — 自分クリーチャーをクリックしてください（紫枠）';
    } else if (tmType === 'ownLand') {
      hint.innerHTML = '🎯 <b>還元コスト</b> — アンタップ状態の土地をクリックしてください（紫枠）';
    } else {
      hint.innerHTML = '🎯 <b>対象選択中</b> — 対象をクリックしてください';
    }
    hint.style.color = '#ff88ff';
  } else if (G.chargingMode === true) {
    hint.innerHTML = '⭐ <b>チャージ</b> — 手札からチャージするカードを選択';
    hint.style.color = '#ffaa00';
  } else if (G.chargingMode === 'pick_land') {
    hint.innerHTML = '⭐ <b>チャージ</b> — チャージする土地をクリックしてください';
    hint.style.color = '#ffaa00';
  } else if (G.mulliganMode) {
    hint.innerHTML = '🔄 <b>マリガン</b> — 戻すカードをクリック（赤枠）して「確認」を押す';
    hint.style.color = '#aaaaff';
  } else if (G.awaitingPriority && G.priorityFor === NET_MY_IDX) {
    hint.innerHTML = '⚡ <b>優先権</b> — Quickスペルを使用できます（「優先権パス」で続行）';
    hint.style.color = '#ffcc44';
  } else if (G.awaitingPriority && !myTurn && G.priorityFor !== NET_MY_IDX) {
    hint.innerHTML = `⚡ <b>優先権</b> — ${oppName}が応答中です...`;
    hint.style.color = '#aaddff';
  } else if (myTurn && G.phase === 'main') {
    const canAtk = G.players[NET_MY_IDX].field.some(c => canCreatureAttack(NET_MY_IDX, c));
    if (canAtk) {
      hint.innerHTML = '🗡️ 土地でマナ / 手札でカードプレイ / <b>オレンジのクリーチャーをクリックで攻撃</b>';
    } else {
      hint.innerHTML = '🎮 土地をクリックでマナ追加 / 手札をクリックでカードプレイ';
    }
    hint.style.color = '#88aaff';
  } else if (!myTurn) {
    hint.innerHTML = `⏳ <b>${oppName}のターン</b>`;
    hint.style.color = '#888';
  } else {
    hint.textContent = '';
  }

  const btnCharge = document.getElementById('btn-charge');
  btnCharge.disabled = G.activePlayer !== 0 || G.phase !== 'main' || G.chargeUsedThisTurn;
  const btnEnd = document.getElementById('btn-end-phase');
  btnEnd.disabled = (!G.playerBlockMode && G.activePlayer !== 0) || G.phase === 'ended';

  // Pass button: enable when priority window open for player, and update label
  const btnPass = document.getElementById('btn-pass');
  if (G.awaitingPriority && G.priorityFor === 0) {
    btnPass.textContent = '優先権パス（対応終了）';
    btnPass.disabled = false;
  } else {
    btnPass.textContent = '優先権パス';
    btnPass.disabled = false;
  }
}

function updateThresholdGauge() {
  const cx = getCXValue(NET_MY_IDX);
  const labelEl = document.getElementById('threshold-label');
  const fillEl = document.getElementById('threshold-fill');
  const countEl = document.getElementById('threshold-count');
  if (!labelEl || !fillEl) return;
  const cx6 = cx >= 6 ? '🟡CX6✓' : 'CX6✗';
  const cx8 = cx >= 8 ? '🟠CX8✓' : 'CX8✗';
  const oc  = cx >= 10 ? '🔴OC✓'  : 'OC✗';
  labelEl.textContent = `${cx6} ${cx8} ${oc}`;
  if (countEl) countEl.textContent = `${cx}/10`;
  const pct = Math.min(cx / 10 * 100, 100);
  fillEl.style.width = pct + '%';
  if (cx >= 10) {
    fillEl.style.background = '#cc3333';
  } else if (cx >= 8) {
    fillEl.style.background = '#cc7722';
  } else if (cx >= 6) {
    fillEl.style.background = '#ccaa33';
  } else {
    fillEl.style.background = '#555';
  }
}

// ============================================================
// 7. COMBAT ARROWS
// ============================================================
function drawCombatArrows() {
  const svg = document.getElementById('arrow-overlay');
  if (!svg) return;
  svg.innerHTML = '';
  if (!G || !G.combatArrows || G.combatArrows.length === 0) return;
  G.combatArrows.forEach(arrow => {
    const fromEl = document.querySelector(`[data-inst="${arrow.fromId}"]`);
    const toEl = arrow.toId ? document.querySelector(`[data-inst="${arrow.toId}"]`) : document.getElementById('ai-life');
    if (!fromEl || !toEl) return;
    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();
    const x1 = fr.left + fr.width / 2;
    const y1 = fr.top + fr.height / 2;
    const x2 = tr.left + tr.width / 2;
    const y2 = tr.top + tr.height / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', arrow.color || '#ff8800');
    line.setAttribute('stroke-width', '2.5');
    line.setAttribute('stroke-dasharray', '6 3');
    line.setAttribute('marker-end', 'url(#arrowhead)');
    line.setAttribute('opacity', '0.8');
    svg.appendChild(line);
  });
  // arrowhead marker
  if (!svg.querySelector('defs')) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `<marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ff8800"/></marker>`;
    svg.insertBefore(defs, svg.firstChild);
  }
}

      }

  });
  // Untapped lands potential mana
  const untappedLabel = document.getElementById('mana-untapped-label');
  if (untappedLabel) {
    const potential = {};
    p0.lands.forEach(land => {
      if (!land.tapped) {
        const lc = CARD_DB[land.cardId];
        const mc = lc.produces || 'C';
        potential[mc] = (potential[mc] || 0) + 1;

    const parts = Object.entries(potential).map(([c, n]) => `${c}×${n}`);
    untappedLabel.textContent = parts.length ? '未タップ: ' + parts.join(' ') : '';
  }
}
